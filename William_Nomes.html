<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📝 William Nomes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a14; color: #e8e8e8; min-height: 100vh; }

.topbar { background: #111122; border-bottom: 1px solid #2a2a3a; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 12px; color: #c8a96e; letter-spacing: 1px; font-weight: 700; }
.clock { font-size: 17px; font-weight: 700; color: #c8a96e; font-variant-numeric: tabular-nums; }

.container { padding: 10px; max-width: 480px; margin: 0 auto; }

.card { background: #141424; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.card-title { font-size: 11px; font-weight: 700; color: #c8a96e; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

.btn-reset { width: 100%; padding: 10px; background: none; border: 1px solid #444; border-radius: 10px; color: #888; font-size: 12px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<div class="topbar">
  <h1>⚔ WILLIAM — NOMES</h1>
  <div class="clock" id="clock">00:00</div>
</div>

<div class="container" id="main"></div>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
var KEY = 'william_superapp_v1'; // mesma chave do SuperApp — os nomes ficam sincronizados
function loadState() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }
function saveState(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e) {} }

function getNomes() {
  var s = loadState();
  return s.nomes_rascunho || [];
}
function setNomes(data) {
  var s = loadState(); s.nomes_rascunho = data; saveState(s);
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function el(tag,cls,txt){var e=document.createElement(tag);e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function vibe(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
function tick(){var n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
tick(); setInterval(tick,10000);

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render(){
  var main = document.getElementById('main');
  main.innerHTML = '';
  renderNomes(main);
}

function renderNomes(main) {
  var nomes = getNomes();

  var card = document.createElement('div'); card.className='card';
  card.appendChild(el('div','card-title','📝 BANCO DE NOMES — '+nomes.length+' anotados'));

  var hint = el('p','','Viu um nome legal? Anota aqui antes de esquecer! 💡');
  hint.style.cssText='font-size:12px;color:#555;margin-bottom:12px;';
  card.appendChild(hint);

  var addRow = document.createElement('div');
  addRow.style.cssText='display:flex;gap:8px;margin-bottom:16px;';
  var inp = document.createElement('input');
  inp.id='nomeInput'; inp.type='text'; inp.placeholder='Ex: Lautaro, Xevious, Salsaparrilha...';
  inp.style.cssText='flex:1;background:#1a1a2e;border:1px solid #c8a96e;border-radius:10px;padding:11px 12px;font-size:14px;color:#e8e8e8;outline:none;font-family:inherit;';
  inp.addEventListener('keydown',function(e){ if(e.key==='Enter') addNome(); });
  var addBtn = document.createElement('button');
  addBtn.textContent='＋'; addBtn.style.cssText='background:#c8a96e;color:#111;border:none;border-radius:10px;padding:11px 18px;font-size:20px;font-weight:700;cursor:pointer;';
  addBtn.onclick = addNome;
  addRow.appendChild(inp); addRow.appendChild(addBtn);
  card.appendChild(addRow);

  if (nomes.length === 0) {
    var empty = el('div','','Nenhum nome ainda. Quando ver um nome incrível, anota aqui! ⚔️');
    empty.style.cssText='text-align:center;color:#555;font-size:13px;padding:24px 0;';
    card.appendChild(empty);
  } else {
    nomes.forEach(function(n, i) {
      var row = document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 12px;background:#0f0f1e;border-radius:10px;margin-bottom:7px;border:1px solid '+(n.usado?'#2d6a4f':'#2a2a3a')+';';

      var nomeEl = el('div','', (n.usado?'✅ ':'')+n.nome);
      nomeEl.style.cssText='flex:1;font-size:15px;font-weight:700;color:'+(n.usado?'#74c69d':'#e8e8e8')+';'+(n.usado?'text-decoration:line-through;opacity:0.6;':'');

      var dataEl = el('div','',n.data);
      dataEl.style.cssText='font-size:10px;color:#555;white-space:nowrap;';

      var usarBtn = document.createElement('button');
      usarBtn.textContent = n.usado ? '↩' : '✅';
      usarBtn.title = n.usado ? 'Desmarcar' : 'Marcar como usado';
      usarBtn.style.cssText='background:'+(n.usado?'#2a2a3a':'#1a2a1a')+';border:1px solid '+(n.usado?'#444':'#2d6a4f')+';color:'+(n.usado?'#aaa':'#74c69d')+';border-radius:8px;padding:6px 10px;font-size:14px;cursor:pointer;';
      usarBtn.onclick=(function(idx){ return function(){ var ns=getNomes(); ns[idx].usado=!ns[idx].usado; setNomes(ns); render(); }; })(i);

      var delBtn = document.createElement('button');
      delBtn.textContent='🗑️';
      delBtn.style.cssText='background:none;border:none;font-size:16px;cursor:pointer;padding:4px;opacity:0.5;';
      delBtn.onclick=(function(idx){ return function(){ if(!confirm('Remover "'+getNomes()[idx].nome+'"?')) return; var ns=getNomes(); ns.splice(idx,1); setNomes(ns); render(); }; })(i);

      row.appendChild(nomeEl); row.appendChild(dataEl); row.appendChild(usarBtn); row.appendChild(delBtn);
      card.appendChild(row);
    });

    var usados = nomes.filter(function(n){ return n.usado; }).length;
    if (usados > 0) {
      var limparBtn = document.createElement('button');
      limparBtn.className='btn-reset';
      limparBtn.textContent='🗑️ Limpar '+usados+' nome'+(usados>1?'s':'')+' já usado'+(usados>1?'s':'');
      limparBtn.style.cssText='margin-top:8px;color:#aa3333;border-color:#aa3333;';
      limparBtn.onclick=function(){
        if(confirm('Remover todos os nomes marcados como usados?')){
          setNomes(getNomes().filter(function(n){return !n.usado;}));
          render();
        }
      };
      card.appendChild(limparBtn);
    }
  }

  main.appendChild(card);
}

function addNome() {
  var inp = document.getElementById('nomeInput');
  if (!inp || !inp.value.trim()) return;
  var ns = getNomes();
  var hoje = new Date().toLocaleDateString('pt-BR');
  ns.unshift({ nome: inp.value.trim(), data: hoje, usado: false });
  setNomes(ns);
  vibe([30]);
  render();
}

// INIT
render();
</script>
</body>
</html>
