<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚔ Conquer EU — Menu de Personagens</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e8e8e8; min-height: 100vh; }

  header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 16px 20px; border-bottom: 1px solid #2a2a3a; }
  header h1 { font-size: 15px; font-weight: 600; color: #c8a96e; letter-spacing: 1px; }
  header p { font-size: 11px; color: #666; margin-top: 2px; }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Caixa de busca — ✕ sempre visível dentro do input */
  .search-wrap { position: relative; margin-bottom: 8px; display: flex; gap: 8px; }
  .search-wrap input {
    flex: 1; background: #1e1e2e; border: 1px solid #333; border-radius: 10px;
    padding: 12px 40px 12px 14px; font-size: 15px; color: #e8e8e8; outline: none;
  }
  .search-wrap input:focus { border-color: #c8a96e; }
  .search-wrap input::placeholder { color: #555; }
  .btn-clear-inline {
    position: absolute; right: 88px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: #666; font-size: 18px; cursor: pointer;
    padding: 4px 8px; line-height: 1; transition: color 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-clear-inline:hover { color: #c8a96e; }
  .btn-clear-inline.hidden { opacity: 0; pointer-events: none; }

  button { cursor: pointer; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; transition: opacity 0.15s; }
  button:active { opacity: 0.7; }

  .btn-buscar { background: #c8a96e; color: #0f0f0f; padding: 12px 18px; white-space: nowrap; }
  .btn-salvar { background: #2d6a4f; color: #b7e4c7; padding: 14px; width: 100%; font-size: 15px; margin-top: 4px; }
  .btn-salvar.saved { background: #1b4332; color: #74c69d; }

  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .suggestions span { background: #1e1e2e; border: 1px solid #333; border-radius: 8px; padding: 4px 12px; font-size: 13px; color: #c8a96e; cursor: pointer; }

  .empty { text-align: center; padding: 3rem 1rem; color: #444; font-size: 14px; }
  .empty .icon { font-size: 36px; margin-bottom: 12px; }

  .card { background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 16px; padding: 18px; }

  .char-header { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid #2a2a3a; }
  .avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
  .char-name { font-size: 18px; font-weight: 600; }
  .cat-badge { font-size: 11px; padding: 2px 10px; border-radius: 20px; display: inline-block; margin-top: 4px; }

  .cat-principal    { background: #5c1a1a; color: #ffcccc; }
  .cat-intermediario { background: #1a3d2b; color: #b8f0d0; }
  .cat-suporte      { background: #2d1a4a; color: #d4b8f0; }
  .cat-armazem      { background: #0d2137; color: #b0d4f0; }
  .cat-mula         { background: #1a3320; color: #a8e6b8; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { margin-bottom: 12px; }
  .field label { font-size: 11px; color: #666; display: block; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }
  .field input, .field textarea { width: 100%; background: #0f0f1a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 10px 12px; font-size: 14px; color: #e8e8e8; outline: none; font-family: inherit; }
  .field input:focus, .field textarea:focus { border-color: #c8a96e; }
  .field textarea { resize: vertical; min-height: 70px; }

  .saved-msg { text-align: center; font-size: 13px; color: #74c69d; margin-top: 10px; display: none; }
  .not-found { text-align: center; padding: 2rem 1rem; color: #555; font-size: 14px; }
</style>
</head>
<body>

<header>
  <h1>⚔ CLASSIC CONQUER ONLINE — EU</h1>
  <p>Menu de Personagens · William v6</p>
</header>

<div class="container">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Nome do personagem..." autocomplete="off" autocorrect="off" spellcheck="false" />
    <button class="btn-clear-inline hidden" id="clearBtn" onclick="doClear()" title="Limpar busca">✕</button>
    <button class="btn-buscar" onclick="doSearch()">Buscar</button>
  </div>

  <div class="suggestions" id="suggestions"></div>

  <div class="empty" id="emptyState">
    <div class="icon">⚔</div>
    <p>Digite o nome de um personagem para ver e editar a ficha.</p>
  </div>

  <div class="not-found" id="notFound" style="display:none">
    <div style="font-size:24px;margin-bottom:8px;">🔍</div>
    <p id="notFoundMsg"></p>
  </div>

  <div class="card" id="card" style="display:none">
    <div class="char-header">
      <div class="avatar" id="avatar"></div>
      <div>
        <div class="char-name" id="charName"></div>
        <div class="cat-badge" id="catBadge"></div>
      </div>
    </div>

    <div class="grid2">
      <div class="field"><label>Nível</label><input type="number" id="f_nivel" /></div>
      <div class="field"><label>Classe</label><input type="text" id="f_classe" /></div>
      <div class="field"><label>Categoria</label><input type="text" id="f_categoria" /></div>
      <div class="field"><label>Nível prof.</label><input type="text" id="f_nivelprof" /></div>
    </div>

    <div class="field"><label>Proficiência / Ilha</label><input type="text" id="f_proficiencia" /></div>
    <div class="field"><label>Arma / level</label><input type="text" id="f_arma" /></div>

    <div class="grid2">
      <div class="field"><label>Refino</label><input type="text" id="f_refino" /></div>
      <div class="field"><label>Sockets</label><input type="text" id="f_sockets" /></div>
      <div class="field"><label>Gema 1</label><input type="text" id="f_gema1" /></div>
      <div class="field"><label>Gema 2</label><input type="text" id="f_gema2" /></div>
    </div>

    <div class="field"><label>Função / Descrição</label><textarea id="f_descricao"></textarea></div>

    <button class="btn-salvar" id="saveBtn" onclick="doSave()">Salvar alterações</button>
    <div class="saved-msg" id="savedMsg">✓ Salvo no dispositivo</div>
  </div>
</div>

var FIELDS = ["num","nome","nivel","classe","categoria","proficiencia","nivelprof","arma","refino","sockets","gema1","gema2","descricao"];
var STORAGE_KEY = "cq_eu_v6";
var charMap = {};
var currentNum = null;

var CAT_CLASS = {
  "Principal": "cat-principal",
  "Intermediário": "cat-intermediario",
  "Suporte / Diárias": "cat-suporte",
  "Armazém": "cat-armazem",
  "Mula / Trade": "cat-mula"
};

function rowToObj(row) {
  var o = {};
  FIELDS.forEach(function(f,i){ o[f] = row[i]; });
  return o;
}

function norm(s) {
  return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function loadData() {
  try {
    var stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      var rows = JSON.parse(stored);
      rows.forEach(function(row){ var o = rowToObj(row); charMap[o.num] = o; });
      return;
    }
  } catch(e) {}
  DEFAULT_CHARS.forEach(function(row){ var o = rowToObj(row); charMap[o.num] = o; });
  saveAll();
}

function saveAll() {
  try {
    var rows = Object.values(charMap).map(function(o){
      return FIELDS.map(function(f){ return o[f] !== undefined ? o[f] : null; });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
  } catch(e) {}
}

function findExact(q) {
  var nq = norm(q);
  var keys = Object.keys(charMap);
  for (var i=0; i<keys.length; i++) {
    if (norm(charMap[keys[i]].nome) === nq) return charMap[keys[i]];
  }
  return null;
}

function findSugg(q) {
  var nq = norm(q);
  if (nq.length < 2) return [];
  return Object.values(charMap)
    .filter(function(o){ return norm(o.nome).indexOf(nq) === 0 && norm(o.nome) !== nq; })
    .map(function(o){ return o.nome; }).slice(0,5);
}

function updateClearBtn() {
  var val = document.getElementById("searchInput").value;
  var btn = document.getElementById("clearBtn");
  if (val) { btn.classList.remove("hidden"); }
  else { btn.classList.add("hidden"); }
}

function doSearch() {
  var q = document.getElementById("searchInput").value.trim();
  document.getElementById("suggestions").innerHTML = "";
  document.getElementById("notFound").style.display = "none";
  updateClearBtn();
  if (!q) { showEmpty(); return; }
  var match = findExact(q);
  if (match) { showCard(match); }
  else {
    document.getElementById("emptyState").style.display = "none";
    document.getElementById("card").style.display = "none";
    document.getElementById("notFound").style.display = "block";
    var sugg = findSugg(q);
    var msg = '"' + q + '" não encontrado.';
    if (sugg.length) {
      msg += '<br><br><small>Quis dizer:</small><br>';
      sugg.forEach(function(s){
        msg += '<span onclick="selectSugg(\'' + s + '\')" style="display:inline-block;margin:4px 4px 0 0;background:#1e1e2e;border:1px solid #333;border-radius:8px;padding:4px 12px;font-size:13px;color:#c8a96e;cursor:pointer">' + s + '</span>';
      });
    }
    document.getElementById("notFoundMsg").innerHTML = msg;
    currentNum = null;
  }
}

function selectSugg(nome) {
  document.getElementById("searchInput").value = nome;
  doSearch();
}

function showCard(obj) {
  currentNum = obj.num;
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("notFound").style.display = "none";
  document.getElementById("card").style.display = "block";
  document.getElementById("savedMsg").style.display = "none";
  document.getElementById("saveBtn").textContent = "Salvar alterações";
  document.getElementById("saveBtn").className = "btn-salvar";

  var cls = CAT_CLASS[obj.categoria] || "cat-mula";
  var initials = (obj.nome||"?").substring(0,2).toUpperCase();
  document.getElementById("avatar").textContent = initials;
  document.getElementById("avatar").className = "avatar " + cls;
  document.getElementById("charName").textContent = obj.nome || "";
  var badge = document.getElementById("catBadge");
  badge.textContent = obj.categoria || "";
  badge.className = "cat-badge " + cls;

  document.getElementById("f_nivel").value = obj.nivel != null ? obj.nivel : "";
  document.getElementById("f_classe").value = obj.classe || "";
  document.getElementById("f_categoria").value = obj.categoria || "";
  document.getElementById("f_nivelprof").value = obj.nivelprof != null ? obj.nivelprof : "";
  document.getElementById("f_proficiencia").value = obj.proficiencia || "";
  document.getElementById("f_arma").value = obj.arma || "";
  document.getElementById("f_refino").value = obj.refino || "";
  document.getElementById("f_sockets").value = obj.sockets || "";
  document.getElementById("f_gema1").value = obj.gema1 || "";
  document.getElementById("f_gema2").value = obj.gema2 || "";
  document.getElementById("f_descricao").value = obj.descricao || "";
}

function showEmpty() {
  document.getElementById("emptyState").style.display = "block";
  document.getElementById("card").style.display = "none";
  document.getElementById("notFound").style.display = "none";
  currentNum = null;
}

function doSave() {
  if (currentNum === null) return;
  var o = charMap[currentNum];
  var nv = document.getElementById("f_nivel").value;
  o.nivel = nv !== "" ? Number(nv) : null;
  o.classe = document.getElementById("f_classe").value;
  o.categoria = document.getElementById("f_categoria").value;
  o.nivelprof = document.getElementById("f_nivelprof").value;
  o.proficiencia = document.getElementById("f_proficiencia").value;
  o.arma = document.getElementById("f_arma").value;
  o.refino = document.getElementById("f_refino").value;
  o.sockets = document.getElementById("f_sockets").value;
  o.gema1 = document.getElementById("f_gema1").value;
  o.gema2 = document.getElementById("f_gema2").value;
  o.descricao = document.getElementById("f_descricao").value;
  saveAll();
  var btn = document.getElementById("saveBtn");
  btn.textContent = "✓ Salvo!";
  btn.className = "btn-salvar saved";
  document.getElementById("savedMsg").style.display = "block";
  setTimeout(function(){ btn.textContent = "Salvar alterações"; btn.className = "btn-salvar"; document.getElementById("savedMsg").style.display = "none"; }, 2200);
}

function doClear() {
  document.getElementById("searchInput").value = "";
  document.getElementById("suggestions").innerHTML = "";
  document.getElementById("clearBtn").classList.add("hidden");
  showEmpty();
}

document.getElementById("searchInput").addEventListener("keydown", function(e){ if(e.key==="Enter") doSearch(); });
document.getElementById("searchInput").addEventListener("input", function(){
  updateClearBtn();
  var q = this.value.trim();
  var el = document.getElementById("suggestions");
  if (q.length < 2) { el.innerHTML = ""; return; }
  var sugg = findSugg(q);
  el.innerHTML = sugg.map(function(s){
    return '<span onclick="selectSugg(\'' + s + '\')">' + s + '</span>';
  }).join("");
});

loadData();
</script>
