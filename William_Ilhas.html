<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔ William — Ilhas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a14;color:#e8e8e8;min-height:100vh;}

.topbar{background:#111122;border-bottom:1px solid #2a2a3a;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar h1{font-size:11px;color:#c8a96e;letter-spacing:1px;font-weight:700;}
.clock{font-size:17px;font-weight:700;color:#c8a96e;font-variant-numeric:tabular-nums;}

.server-bar{display:flex;background:#0d0d1a;border-bottom:1px solid #2a2a3a;}
.srv-btn{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:#555;transition:all 0.2s;}
.srv-btn.active-eu{color:#90EE90;border-color:#90EE90;background:#0f1a0f;}
.srv-btn.active-america{color:#87CEFA;border-color:#87CEFA;background:#0f141a;}
.srv-btn.active-murica{color:#ff9944;border-color:#ff9944;background:#1a120a;}

.tabs{display:flex;background:#0a0a12;border-bottom:1px solid #1a1a2a;}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:#444;transition:all 0.2s;}
.tab.active{color:#c8a96e;border-color:#c8a96e;}

.container{padding:10px;max-width:480px;margin:0 auto;}

/* ILHA TABS */
.ilha-tabs{display:flex;gap:6px;margin-bottom:10px;}
.ilha-tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all 0.2s;background:#1a1a2a;color:#555;}
.ilha-tab.active-scorpius{background:#0f141a;color:#87CEFA;border:1px solid #87CEFA;}
.ilha-tab.active-rigel{background:#0f1a0f;color:#90EE90;border:1px solid #90EE90;}
.ilha-tab.active-hubble{background:#150f1a;color:#DDA0DD;border:1px solid #DDA0DD;}

/* GRID DOS 3 CARDS */
.queue-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.queue-grid.two-col{grid-template-columns:1fr 1fr;}
.fcard{background:#141424;border:1px solid #2a2a3a;border-radius:12px;padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.fcard.full{border-color:#ff4444;background:#1a0f0f;}
.flabel{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 0;}
.flabel.refinados{color:#c8a96e;}
.flabel.elite{color:#ff9944;}
.flabel.compose{color:#88ddff;}
.flabel.meteoros{color:#ffb347;}
.flabel.gates{color:#4dd0e1;}
.flabel.pinnable{cursor:pointer;background:#1a2a3a;border:1px dashed #87CEFA;border-radius:6px;padding:3px 4px;}
.flabel.pinnable:active{transform:scale(0.96);}
.progress-bar{width:100%;height:3px;background:#2a2a3a;border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s;}
.progress-fill.refinados{background:#c8a96e;}
.progress-fill.elite{background:#ff9944;}
.progress-fill.meteoros{background:#ffb347;}
.progress-fill.gates{background:#4dd0e1;}
.big-num{font-size:34px;font-weight:800;line-height:1;}
.char-name-ilha{font-size:10px;text-align:center;font-weight:600;min-height:14px;}
.remaining{font-size:10px;font-weight:700;}
.fcard.peeking{border:1px dashed #87CEFA;background:#0f1620;}
.fcard.is-current{border:2px solid #74c69d;box-shadow:0 0 8px rgba(116,198,157,0.35);}
.status-msg{font-size:9px;font-weight:700;color:#ff4444;}
@keyframes pulse{0%,100%{border-color:#ff4444}50%{border-color:#ff0000;box-shadow:0 0 10px #ff000055}}
.fcard.pulse{animation:pulse 0.8s ease-in-out 3;}

/* PAINEL INFERIOR */
.info-panel{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.info-panel.two-col{grid-template-columns:1fr 1fr;}
.info-card{background:#0f0f1e;border:1px solid #2a2a3a;border-radius:10px;padding:8px 6px;display:flex;flex-direction:column;gap:4px;}
.info-card.peeking{border:1px dashed #87CEFA;background:#0f1620;}
.info-ilha-label{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;}
.info-charname{font-size:11px;font-weight:700;text-align:center;min-height:16px;}
.info-row{display:flex;align-items:center;gap:3px;}
.info-row span{font-size:10px;color:#c8a96e;font-weight:700;white-space:nowrap;}
.info-input{flex:1;background:#1a1a2e;border:1px solid #333;border-radius:6px;padding:5px 4px;font-size:13px;color:#e8e8e8;outline:none;width:100%;font-family:inherit;text-align:center;}
.info-input.lv-input{font-size:18px;font-weight:800;color:#4ade80;padding:7px 4px;}
.info-input:focus{border-color:#c8a96e;}

/* NAV BUTTONS */
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;width:100%;}
.btn-nav{padding:7px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:transform 0.1s;}
.btn-nav:active{transform:scale(0.93);}
.btn-prev{background:#2a2a3a;color:#aaa;}
.btn-next{background:#c8a96e;color:#111;}

/* BUSCA */
.search-wrap{margin-bottom:8px;}
.search-row{display:flex;gap:6px;align-items:stretch;}
.search-input{width:100%;background:#1e1e2e;border:1px solid #333;border-radius:10px;padding:10px 14px;font-size:14px;color:#e8e8e8;outline:none;font-family:inherit;flex:1;min-width:0;}
.search-input:focus{border-color:#c8a96e;}
.total-banco-badge{flex-shrink:0;background:#1a1608;border:1px solid #c8a96e;border-radius:10px;padding:6px 10px;text-align:center;display:flex;flex-direction:column;justify-content:center;min-width:72px;}
.total-banco-badge .tbb-label{font-size:8px;font-weight:700;color:#c8a96e;letter-spacing:0.5px;}
.total-banco-badge .tbb-val{font-size:14px;font-weight:800;color:#FFD700;line-height:1.2;}
.search-result{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#141424;border:1px solid #2a2a3a;border-radius:8px;margin-bottom:4px;cursor:pointer;}
.search-result:active{opacity:.7;transform:scale(.98);}
.search-result-left .sr-nome{font-size:14px;font-weight:700;}
.search-result-left .sr-info{font-size:10px;color:#888;margin-top:1px;}
.search-result-right{font-size:15px;font-weight:800;color:#c8a96e;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:1px;}
.sr-level{font-size:16px;font-weight:800;color:#4ade80;}
.sr-level.sr-level-empty{color:#444;font-size:12px;font-weight:600;}
.sr-gold{font-size:11px;font-weight:700;color:#c8a96e;}
.sr-tag{font-size:9px;font-weight:700;color:#666;}

/* MULAS */
.btn-add-mula{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;background:linear-gradient(135deg,#1a2a1a,#0f1a0f);border:2px solid #90EE90;border-radius:12px;color:#90EE90;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px;}
.btn-add-mula:active{opacity:0.7;transform:scale(0.97);}
.btn-gerenciar{background:#1a1a2e;border:1px solid #555;border-radius:12px;color:#aaa;font-size:13px;font-weight:700;cursor:pointer;padding:12px 14px;white-space:nowrap;}
.btn-reset{display:block;width:100%;padding:10px;background:#1a1a2a;border:1px solid #333;border-radius:10px;color:#555;font-size:12px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:8px;}
button:active{opacity:0.7;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:300;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#141424;border:1px solid #2a2a3a;border-radius:24px 24px 0 0;padding:20px 16px 32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:#2a2a3a;border-radius:2px;margin:0 auto 16px;}
.modal h3{color:#c8a96e;font-size:14px;margin-bottom:14px;}
.modal-field{margin-bottom:10px;}
.modal-field label{font-size:10px;color:#666;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;background:#0a0a14;border:1px solid #333;border-radius:8px;padding:10px;font-size:14px;color:#e8e8e8;outline:none;font-family:inherit;}
.modal-field input:focus,.modal-field select:focus{border-color:#c8a96e;}
.modal-field select option{background:#141424;}
.modal-btns{display:flex;gap:8px;margin-top:12px;}
.modal-ok{flex:1;padding:12px;background:#c8a96e;color:#111;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.modal-cancel{flex:1;padding:12px;background:#2a2a3a;color:#aaa;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}

/* GERENCIAR LISTA */
.mula-manage-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#0f0f1e;border-radius:8px;margin-bottom:6px;border:1px solid #2a2a3a;}
.mula-manage-info{flex:1;}
.mula-manage-nome{font-size:13px;font-weight:700;color:#e8e8e8;}
.mula-manage-sub{font-size:10px;margin-top:1px;}
.mula-del-btn{background:#1a0f0f;border:1px solid #aa3333;border-radius:8px;color:#ff6666;font-size:14px;cursor:pointer;padding:6px 10px;}

/* BACKUP */
.backup-row{display:flex;gap:8px;margin-top:10px;}
.btn-export{flex:1;padding:12px;background:#1a2a1a;border:1px solid #2d6a4f;border-radius:10px;color:#74c69d;font-size:13px;font-weight:600;cursor:pointer;}
.btn-import{flex:1;padding:12px;background:#1a1a2a;border:1px solid #444;border-radius:10px;color:#aaa;font-size:13px;font-weight:600;cursor:pointer;}
.drive-btn{display:block;width:100%;padding:12px;background:#1a1a2a;border:1px solid #4285f4;border-radius:10px;color:#4285f4;font-size:13px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:8px;}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}
.login-overlay { position: fixed; inset: 0; background: #0a0a14; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: #141424; border: 1px solid #2a2a3a; border-radius: 16px; padding: 28px 22px; width: 100%; max-width: 320px; text-align: center; }
.login-box h2 { font-size: 15px; color: #c8a96e; letter-spacing: 1px; margin-bottom: 4px; }
.login-box p { font-size: 11px; color: #666; margin-bottom: 18px; }
.login-box input { width: 100%; background: #1a1a2e; border: 1px solid #333; border-radius: 10px; padding: 11px 12px; font-size: 14px; color: #e8e8e8; outline: none; font-family: inherit; margin-bottom: 10px; }
.login-box input:focus { border-color: #c8a96e; }
.login-box button { width: 100%; background: #c8a96e; color: #111; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.login-box button:disabled { opacity: 0.6; }
.login-error { font-size: 11px; color: #ff6666; margin-top: 10px; min-height: 14px; }
</style>

<script>
var KEY    = 'william_superapp_v1';
var server = 'eu';
var tab    = 'ilhas';
var ilha   = 'scorpius';
var peekState = {}; // controla "espiar" mulas anteriores sem alterar a atual em uso

var ILHA_CHARS = {
  rigel:    ["","Tirisfall","Nagrand","Karazhan","Lordaeron","Andromath","Malfurion","Atiesh","Nefarian","Onyxia","Chevette","Krypton","Skylab","Santana","Sears","Zok","Goliath","Morbiduz","Gotham","Zion","Caesium137","Magneto","Rivelta","Laguna","Midfield","Outland","Azeroth","Xevious","Druaga","Autorama","Mococa"],
  scorpius: ["","Proudmoore","Lothar","Greymane","Thrall","Uther","Tyrande","Zaxxon","Falagrum","Vancleef","Michonne","Arcus","Tanaris","Cybertron","Kisuco","Shinobi","Morbidus","Overlord","Supernova","Asgard","Orion","Nucleus","Curupira","Bayonet","Sequoia","Drakkari","Corleone","Zandalar","Quake","CoolNight","Magnum"],
  hubble:   ["","Zephyr","Hyperion","Kepler","Agnus","Longest","Zenith","Capivara","Mangaba","Catarinense","Darkseid","Ultron","Samanosuke","Megalith","Mobius1","Yellow13","Vercetti","Alastor","Neville","Ancelotti","Scaloni","Sampaoli","Lakesia","Vozinha","COSIPA","Riga","Anchieta","Imigrantes","Brabham","Gardenal","Gonzaga"]
};

// STATE
function loadState(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}}
function saveState(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}

function getIlhaState(isl){
  var s=loadState(), k=server+'_ilha_'+isl;
  if(!s[k]) s[k]={refinados:1,elite:25,meteoros:1,gates:1,compose:null,levels:{},bancos:{}};
  ['levels','bancos'].forEach(function(f){if(!s[k][f])s[k][f]={};});
  if(!s[k].elite) s[k].elite=25;
  if(!s[k].meteoros) s[k].meteoros=1;
  // Migração: compose antigo era um mapa {slot:0/1}; agora é um ponteiro único (igual refinados/elite)
  if(s[k].compose&&typeof s[k].compose==='object'){
    var slotsAntigos=Object.keys(s[k].compose).map(Number).sort(function(a,b){return a-b;});
    var livre=slotsAntigos.find(function(x){return s[k].compose[x]!==1;});
    s[k].compose=livre!==undefined?livre:(slotsAntigos.length?slotsAntigos[slotsAntigos.length-1]+1:null);
  }
  if(!s[k].gates) s[k].gates=1;
  saveState(s); return s[k];
}
function setIlhaState(isl,st){var s=loadState();s[server+'_ilha_'+isl]=st;saveState(s);}

function getIlhaNome(isl,n){
  var s=loadState(), k=server+'_ilha_nomes_'+isl;
  var nomes=s[k]||{};
  if(nomes[n]) return nomes[n];
  if(server==='eu'&&ILHA_CHARS[isl]&&ILHA_CHARS[isl][n]) return ILHA_CHARS[isl][n];
  return 'Slot '+n;
}
function setIlhaNome(isl,n,nome){var s=loadState(),k=server+'_ilha_nomes_'+isl;if(!s[k])s[k]={};s[k][n]=nome;saveState(s);}
function getIlhaTipos(isl){var s=loadState(),k=server+'_ilha_tipos_'+isl;return s[k]||{};}
function setIlhaTipo(isl,slot,tipo){var s=loadState(),k=server+'_ilha_tipos_'+isl;if(!s[k])s[k]={};s[k][slot]=tipo;saveState(s);}

function getIlhaSlots(isl){
  var refinSlots=[],eliteSlots=[],compSlots=[],meteorosSlots=[],gatesSlots=[];
  // EU: nomes fixos
  if(server==='eu'&&ILHA_CHARS[isl]){
    for(var i=1;i<=24;i++) refinSlots.push(i);
    for(var i=25;i<=26;i++) eliteSlots.push(i);
    for(var i=27;i<=30;i++) compSlots.push(i);
  }
  // Mulas extras (todos os servidores)
  var tipos=getIlhaTipos(isl);
  Object.keys(tipos).forEach(function(slot){
    var s=parseInt(slot),t=tipos[slot];
    var jaExiste=refinSlots.indexOf(s)>=0||eliteSlots.indexOf(s)>=0||compSlots.indexOf(s)>=0||meteorosSlots.indexOf(s)>=0||gatesSlots.indexOf(s)>=0;
    if(!jaExiste){
      if(t==='refinados') refinSlots.push(s);
      else if(t==='elite') eliteSlots.push(s);
      else if(t==='meteoros') meteorosSlots.push(s);
      else if(t==='gates') gatesSlots.push(s);
      else compSlots.push(s);
    }
  });
  refinSlots.sort(function(a,b){return a-b;});
  eliteSlots.sort(function(a,b){return a-b;});
  compSlots.sort(function(a,b){return a-b;});
  meteorosSlots.sort(function(a,b){return a-b;});
  gatesSlots.sort(function(a,b){return a-b;});
  return {refinSlots:refinSlots,eliteSlots:eliteSlots,compSlots:compSlots,meteorosSlots:meteorosSlots,gatesSlots:gatesSlots};
}

function getTotalMulas(isl){
  var s=loadState(),k=server+'_ilha_nomes_'+isl;
  var nomes=s[k]||{};
  var maxNome=0;
  Object.keys(nomes).forEach(function(n){var num=parseInt(n);if(num>maxNome)maxNome=num;});
  var base=server==='eu'?(ILHA_CHARS[isl].length-1):0;
  var tipos=getIlhaTipos(isl);
  var maxTipo=0;
  Object.keys(tipos).forEach(function(n){var num=parseInt(n);if(num>maxTipo)maxTipo=num;});
  return Math.max(base,maxNome,maxTipo);
}

// SERVER & TAB
function setServer(sv){
  server=sv;
  document.querySelectorAll('.srv-btn').forEach(function(b){b.className='srv-btn';});
  document.getElementById('srv-'+sv).className='srv-btn active-'+sv;
  render();
}
function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('pageTitle').textContent=t==='meteoros'?'⚔ WILLIAM — METEOROS E GATES':t==='backup'?'⚔ WILLIAM — BACKUP':'⚔ WILLIAM — ILHAS';
  render();
}
function setIsland(isl){ilha=isl;render();}

// RENDER
function render(){
  var main=document.getElementById('main');
  main.innerHTML='';
  if(tab==='ilhas'||tab==='meteoros') renderIlhas(main);
  else renderBackup(main);
}

// ══════════════════════════════════════════════════════
// ILHAS
// ══════════════════════════════════════════════════════
function getViewInfo(type,st,typeSlots){
  // realFull = fila real esgotada (ponteiro passou do último slot existente)
  var realIdx=typeSlots.indexOf(st[type]);
  var realFull=realIdx===-1&&typeSlots.length>0&&st[type]>typeSlots[typeSlots.length-1];
  var realSlot=realFull?st[type]:(realIdx===-1?(typeSlots[0]!==undefined?typeSlots[0]:st[type]):st[type]);

  var peekKey=ilha+'_'+type;
  var peekedSlot=peekState[peekKey];
  var isPeeking=false;
  var viewSlot=realSlot;

  if(peekedSlot!==undefined){
    // Espiar sempre se refere a um slot que REALMENTE existe na fila —
    // guardamos o número do slot (não a posição), então continua válido
    // mesmo se novas mulas forem adicionadas/removidas depois.
    if(typeSlots.indexOf(peekedSlot)!==-1 && (realFull||peekedSlot!==realSlot)){
      viewSlot=peekedSlot;
      isPeeking=true;
    } else {
      // peek inválido/obsoleto (slot removido, ou já é o mesmo da atual) — limpa
      delete peekState[peekKey];
    }
  }

  var isFull=!isPeeking&&realFull;
  return { current: isFull?st[type]:viewSlot, isPeeking: isPeeking, isFull: isFull, realSlot: realSlot, realFull: realFull };
}

function parseGoldValue(str){
  if(!str) return 0;
  var s=String(str).trim().replace(/[^\d.,]/g,'');
  if(!s) return 0;
  // Vírgula só conta como decimal se aparecer no final com até 2 dígitos (ex: 1.234,56)
  var decimals='';
  var m=s.match(/,(\d{1,2})$/);
  if(m){ decimals='.'+m[1]; s=s.slice(0,m.index); }
  // Qualquer ponto/vírgula restante é separador de milhar (formato brasileiro) — remove
  s=s.replace(/[.,]/g,'');
  var n=parseFloat(s+decimals);
  return isNaN(n)?0:n;
}
function fmtBancoTotal(n){
  return Math.round(n).toLocaleString('pt-BR');
}

// ── QUEUE CARD (Refinados / Elite) ──
var TYPE_SLOTKEY={refinados:'refinSlots',elite:'eliteSlots',compose:'compSlots',meteoros:'meteorosSlots',gates:'gatesSlots'};
var TYPE_LABEL={refinados:'REFINADOS',elite:'ELITE',compose:'COMPOSE',meteoros:'METEOROS',gates:'GATES'};
var TYPE_NUMCOLOR={refinados:'#c8a96e',elite:'#ff9944',compose:'#88ddff',meteoros:'#ffb347',gates:'#4dd0e1'};
var TYPE_NAMECOLOR={refinados:'#ffd88a',elite:'#ffb066',compose:'#a8e6c0',meteoros:'#ffcc80',gates:'#80deea'};

function makeQueueCard(type,st,slots){
  var typeSlots=slots[TYPE_SLOTKEY[type]]||[];

  if(typeSlots.length===0){
    var divE=document.createElement('div'); divE.className='fcard empty-type';
    divE.appendChild(el('div','flabel '+type,TYPE_LABEL[type]));
    var msg=el('div','','Nenhuma mula ainda');
    msg.style.cssText='font-size:11px;color:#555;text-align:center;padding:14px 4px;';
    divE.appendChild(msg);
    return divE;
  }

  var peekKey=ilha+'_'+type;
  var vi=getViewInfo(type,st,typeSlots);
  var isPeeking=vi.isPeeking;
  var isFull=vi.isFull;
  var current=vi.current;
  var viewIdx=typeSlots.indexOf(current); // -1 quando current==isFull sentinel
  var isLast=!isFull&&viewIdx===typeSlots.length-1;

  var div=document.createElement('div');
  div.className='fcard'+(isFull?' full':isLast?' almostfull':'')+(isPeeking?' peeking':'')+(!isPeeking&&!isFull?' is-current':'');

  var lbl=document.createElement('div');
  lbl.className='flabel '+type+(isPeeking?' pinnable':'');
  lbl.textContent=(isPeeking?'📌 ':'')+TYPE_LABEL[type];
  if(isPeeking){
    lbl.title='Marcar Slot '+current+' como a mula atual';
    lbl.onclick=(function(tp,slotViewed,pk2){ return function(){
      var s2=getIlhaState(ilha);
      s2[tp]=slotViewed;
      delete peekState[pk2];
      setIlhaState(ilha,s2);
      vibe([50,30,50]);
      render();
    }; })(type,current,peekKey);
  }
  div.appendChild(lbl);

  if(!isFull&&typeSlots.length>0){
    var pb=el('div','progress-bar'), pf=el('div','progress-fill '+type);
    pf.style.width=Math.round(((viewIdx+1)/typeSlots.length)*100)+'%';
    pb.appendChild(pf); div.appendChild(pb);
  }

  var num=el('div','big-num',isFull?'✓':String(current));
  num.style.color=isFull?'#ff4444':TYPE_NUMCOLOR[type];
  div.appendChild(num);

  if(!isFull&&server!=='eu'){
    var cnIn=document.createElement('input');
    cnIn.className='info-input';
    cnIn.style.cssText='font-size:10px;padding:3px 4px;text-align:center;width:100%;color:'+TYPE_NAMECOLOR[type];
    cnIn.placeholder='Nome slot '+current;
    cnIn.value=getIlhaNome(ilha,current)!=='Slot '+current?getIlhaNome(ilha,current):'';
    cnIn.dataset.slot=current;
    cnIn.onchange=(function(sl,isl){return function(){setIlhaNome(isl,sl,this.value);};})(current,ilha);
    div.appendChild(cnIn);
  } else {
    var cn=el('div','char-name-ilha',isFull?'Cheias!':getIlhaNome(ilha,current));
    if(!isFull) cn.style.color=TYPE_NAMECOLOR[type];
    div.appendChild(cn);
  }

  if(isFull) div.appendChild(el('div','status-msg','CHEIAS'));

  var nr=document.createElement('div'); nr.className='nav-row';
  var prev=el('button','btn-nav btn-prev','◀');
  var atFirst=isFull?typeSlots.length===0:viewIdx<=0;
  prev.disabled=atFirst; prev.style.opacity=atFirst?'0.3':'1';
  prev.onclick=function(){peekBack(type,slots);};
  nr.appendChild(prev);

  var next=el('button','btn-nav btn-next','▶');
  var atLast=isFull?true:viewIdx>=typeSlots.length-1;
  next.disabled=atLast; next.style.opacity=atLast?'0.3':'1';
  next.onclick=function(){peekForward(type,slots);};
  nr.appendChild(next);
  div.appendChild(nr);

  // Contador
  if(!isFull&&typeSlots.length>0){
    var restam=typeSlots.length-1-viewIdx;
    var cnt=el('div','remaining',restam===0?'⚠ ÚLTIMA!':restam+' rest.');
    cnt.style.color=restam===0?'#ff4444':restam<=3?'#ffa500':'#a0b8d0';
    cnt.style.textAlign='center'; cnt.style.marginTop='2px';
    div.appendChild(cnt);
  }
  return div;
}

// ── NAVEGAR (◀▶) — nunca muda a mula em uso, só o que está sendo visualizado.
// Marcar uma mula como atual de verdade é só clicar no título do card (📌).
function peekBack(type,slots){ browseNav(type,-1,slots); }
function peekForward(type,slots){ browseNav(type,1,slots); }

function browseNav(type,dir,slots){
  var st=getIlhaState(ilha);
  var typeSlots=slots[TYPE_SLOTKEY[type]]||[];
  if(!typeSlots.length) return;
  var peekKey=ilha+'_'+type;
  var vi=getViewInfo(type,st,typeSlots);
  var curIdx=typeSlots.indexOf(vi.current);
  if(curIdx===-1) curIdx=vi.realFull?typeSlots.length-1:0;
  var newIdx=curIdx+dir;
  if(newIdx<0||newIdx>=typeSlots.length) return;
  var newSlot=typeSlots[newIdx];
  if(!vi.realFull&&newSlot===vi.realSlot){
    delete peekState[peekKey]; // voltou pra atual — sem mexer em nada
  } else {
    peekState[peekKey]=newSlot;
  }
  vibe([10,10,10]);
  render();
}

    : '<option value="refinados">⚔️ Refinados</option><option value="elite">⭐ Elite</option><option value="compose">💎 Compose</option>';

  var body=document.createElement('div');
  body.innerHTML=
    '<div class="modal-field"><label>Nome da mula</label>'+
    '<input id="mNome" type="text" placeholder="Ex: Salsaparrilha" autocomplete="off"></div>'+
    '<div class="modal-field"><label>Tipo</label>'+
    '<select id="mTipo">'+tipoOptions+'</select></div>'+
    '<div class="modal-field"><label>Slot (número)</label>'+
    '<input id="mSlot" type="number" value="'+nextSlot+'" min="1" placeholder="'+nextSlot+'"></div>';

    setIlhaNome(isl,slot,nome);
    setIlhaTipo(isl,slot,tipo);
    closeModal(); render();
    toast('✅ '+nome+' adicionada!');
  };

  setTimeout(function(){var i=document.getElementById('mNome');if(i)i.focus();},200);

// ── GERENCIAR MULAS ──
function showGerenciar(isl){
  var s=loadState();
  var kn=server+'_ilha_nomes_'+isl;
  var kt=server+'_ilha_tipos_'+isl;
  var nomesSalvos=s[kn]||{};
  var tipos=s[kt]||{};

  var todosSlots=new Set();
  Object.keys(nomesSalvos).forEach(function(sl){todosSlots.add(parseInt(sl));});
  Object.keys(tipos).forEach(function(sl){todosSlots.add(parseInt(sl));});
  // Para EU, inclui os fixos também
  if(server==='eu'&&ILHA_CHARS[isl]){
    for(var i=1;i<ILHA_CHARS[isl].length;i++) todosSlots.add(i);
  }
  var slotsArr=Array.from(todosSlots).sort(function(a,b){return a-b;});

  document.getElementById('modalTitle').textContent='⚙️ Mulas — '+isl.toUpperCase();
  var body=document.getElementById('modalBody');
  body.innerHTML='';

  if(slotsArr.length===0){
    body.innerHTML='<div style="font-size:13px;color:#555;padding:12px 0;">Nenhuma mula encontrada.</div>';
  } else {
    var list=document.createElement('div');
    list.style.cssText='max-height:380px;overflow-y:auto;';
    slotsArr.forEach(function(slot){
      var tipo=tipos[slot]||(slot<=24?'refinados':slot<=26?'elite':'compose');
      var nome=getIlhaNome(isl,slot);
      var cor=tipo==='compose'?'#88ddff':tipo==='elite'?'#ff9944':tipo==='meteoros'?'#ffb347':tipo==='gates'?'#4dd0e1':'#c8a96e';
      var icon=tipo==='compose'?'💎':tipo==='elite'?'⭐':tipo==='meteoros'?'☄️':tipo==='gates'?'🌀':'⚔️';
      var isFixed=server==='eu'&&ILHA_CHARS[isl]&&ILHA_CHARS[isl][slot]&&!nomesSalvos[slot];

      var row=document.createElement('div'); row.className='mula-manage-row';
      var info=document.createElement('div'); info.className='mula-manage-info';
      info.innerHTML='<div class="mula-manage-nome">'+nome+'</div>'+
        '<div class="mula-manage-sub" style="color:'+cor+';">'+icon+' '+tipo.toUpperCase()+' · Slot '+slot+(isFixed?' · fixo':'')+'</div>';
      row.appendChild(info);

      if(!isFixed){
        var del=document.createElement('button'); del.className='mula-del-btn'; del.textContent='🗑️';
        del.onclick=(function(sl){return function(){
          if(!confirm('Remover mula do slot '+sl+'?')) return;
          var st2=loadState();
          if(st2[kn]) delete st2[kn][sl];
          if(st2[kt]) delete st2[kt][sl];
          saveState(st2);
          closeModal(); render(); showGerenciar(isl);
        };})(slot);
        row.appendChild(del);
      }
      list.appendChild(row);
    });
    body.appendChild(list);
  }

  document.getElementById('modalBtns').style.display='none';
  document.getElementById('modalOverlay').classList.add('open');
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNKjp7hLNK6mzAX2GK49WEZq-NKgQ9o5Y",
  authDomain: "williamapp-31dff.firebaseapp.com",
  projectId: "williamapp-31dff",
  storageBucket: "williamapp-31dff.firebasestorage.app",
  messagingSenderId: "171912065024",
  appId: "1:171912065024:web:9c47f66f4b8e7fc727a8e5"
};

const ALLOWED_EMAIL = "marcelodossantosfc@gmail.com";

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const docRef = doc(db, "william", "state");

var overlay = document.getElementById('loginOverlay');
var emailIn = document.getElementById('loginEmail');
var senhaIn = document.getElementById('loginSenha');
var loginBtn = document.getElementById('loginBtn');
var errEl = document.getElementById('loginError');

function showError(msg){ errEl.textContent = msg; }

function tryLogin(){
  var email = emailIn.value.trim();
  var senha = senhaIn.value;
  if(!email || !senha){ showError('Preencha e-mail e senha.'); return; }
  loginBtn.disabled = true; loginBtn.textContent = 'Entrando...';
  showError('');
  signInWithEmailAndPassword(auth, email, senha)
    .catch(function(e){
      loginBtn.disabled = false; loginBtn.textContent = 'Entrar';
      showError('E-mail ou senha incorretos.');
    });
}
loginBtn.onclick = tryLogin;
senhaIn.addEventListener('keydown', function(e){ if(e.key==='Enter') tryLogin(); });
emailIn.addEventListener('keydown', function(e){ if(e.key==='Enter') senhaIn.focus(); });

window._applyingRemote = false;
var _pendingRemote = null;
var _saveTimeout = null;

function isTypingNow(){
  var ae = document.activeElement;
  return ae && (ae.tagName==='INPUT' || ae.tagName==='TEXTAREA' || ae.tagName==='SELECT');
}

function applyRemote(remoteStr){
  if (isTypingNow()) { _pendingRemote = remoteStr; return; }
  window._applyingRemote = true;
  localStorage.setItem(window.KEY || 'william_superapp_v1', remoteStr);
  window._applyingRemote = false;
  if (typeof window.render === 'function') window.render();
}

// Se o usuário estava digitando quando chegou uma atualização, aplica assim que ele sair do campo
document.addEventListener('focusout', function(){
  if (_pendingRemote) {
    var p = _pendingRemote; _pendingRemote = null;
    setTimeout(function(){ applyRemote(p); }, 200);
  }
});

var _origSaveState = window.saveState;
window.saveState = function(s) {
  _origSaveState(s);
  if (!window._applyingRemote && auth.currentUser && auth.currentUser.email === ALLOWED_EMAIL) {
    clearTimeout(_saveTimeout);
    _saveTimeout = setTimeout(function(){
      setDoc(docRef, s).catch(function(e){ console.error('Erro ao sincronizar:', e); });
    }, 600);
  }
};

var unsubscribe = null;

onAuthStateChanged(auth, function(user){
  if (user && user.email === ALLOWED_EMAIL) {
    overlay.style.display = 'none';
    loginBtn.disabled = false; loginBtn.textContent = 'Entrar';

    if (!unsubscribe) {
      unsubscribe = onSnapshot(docRef, function(snap){
        if (!snap.exists()) { setDoc(docRef, window.loadState()); return; }
        var remoteStr = JSON.stringify(snap.data());
        var localStr = JSON.stringify(window.loadState());
        if (localStr === remoteStr) return;
        applyRemote(remoteStr);
      }, function(err){ console.error('Erro de sincronização:', err); });
    }
  } else if (user && user.email !== ALLOWED_EMAIL) {
    signOut(auth);
    overlay.style.display = 'flex';
    showError('Conta não autorizada.');
  } else {
    overlay.style.display = 'flex';
  }
});
</script>
