  if (nq.length < 2) return [];
  return Object.values(db).filter(function(o){ return norm(o.nome).indexOf(nq)===0 && norm(o.nome)!==nq; }).map(function(o){ return o.nome; }).slice(0,5);
}

function buscar(q) {
  var query = q || document.getElementById('inp').value.trim();
  document.getElementById('sugg').innerHTML = '';
  document.getElementById('nf').style.display = 'none';
  document.getElementById('btnLimpar').style.display = query ? 'block' : 'none';
  if (!query) { showEmpty(); return; }
  var m = findExact(query);
  if (m) { showCard(m); }
  else {
    showEmpty();
    document.getElementById('empty').style.display = 'none';
    document.getElementById('nf').style.display = 'block';
    var sugg = findSugg(query);
    var html = '"' + query + '" não encontrado.';
    if (sugg.length) { html += '<br><br>'; sugg.forEach(function(s){ html += '<span onclick="selSugg(\''+s+'\')" style="display:inline-block;margin:3px;background:#1e1e2e;border:1px solid #333;border-radius:8px;padding:3px 10px;font-size:13px;color:#c8a96e;cursor:pointer">'+s+'</span>'; }); }
    document.getElementById('nf').innerHTML = html;
    curNum = null;
  }
}

function selSugg(n) { document.getElementById('inp').value = n; buscar(n); }

function showEmpty() {
  document.getElementById('empty').style.display = 'block';
  document.getElementById('card').style.display = 'none';
  document.getElementById('nf').style.display = 'none';
  curNum = null;
}

function showCard(o) {
  curNum = o.num;
  document.getElementById('empty').style.display = 'none';
  document.getElementById('nf').style.display = 'none';
  document.getElementById('card').style.display = 'block';
  document.getElementById('saveMsg').style.display = 'none';
  document.getElementById('btnSalvar').textContent = 'Salvar alterações';
  document.getElementById('btnSalvar').className = 'btn-salvar';

  var cls = CAT[o.categoria] || 'cat-mula';
  document.getElementById('av').textContent = (o.nome||'?').substring(0,2).toUpperCase();
  document.getElementById('av').className = 'avatar ' + cls;
  document.getElementById('cn').textContent = o.nome || '';
  document.getElementById('cb').textContent = o.categoria || '';
  document.getElementById('cb').className = 'cat-badge ' + cls;

  document.getElementById('f0').value = o.nivel != null ? o.nivel : '';
  document.getElementById('f1').value = o.classe || '';
  document.getElementById('f2').value = o.categoria || '';
  document.getElementById('f3').value = o.nivelprof != null ? o.nivelprof : '';
  document.getElementById('f4').value = o.prof || '';
  document.getElementById('f5').value = o.arma || '';
  document.getElementById('f6').value = o.refino != null ? o.refino : '';
  document.getElementById('f7').value = o.sockets != null ? o.sockets : '';
  document.getElementById('f8').value = o.gema1 || '';
  document.getElementById('f9').value = o.gema2 || '';
  document.getElementById('f10').value = o.desc || '';
}

function salvar() {
  if (curNum === null) return;
  var o = db[curNum];
  var nv = document.getElementById('f0').value;
  o.nivel = (nv !== '' && nv !== null) ? Number(nv) : null;
  o.classe = document.getElementById('f1').value;
  o.categoria = document.getElementById('f2').value;
  o.nivelprof = document.getElementById('f3').value;
  o.prof = document.getElementById('f4').value;
  o.arma = document.getElementById('f5').value;
  o.refino = document.getElementById('f6').value;
  o.sockets = document.getElementById('f7').value;
  o.gema1 = document.getElementById('f8').value;
  o.gema2 = document.getElementById('f9').value;
  o.desc = document.getElementById('f10').value;

  var ok = saveDB();
  var btn = document.getElementById('btnSalvar');
  var msg = document.getElementById('saveMsg');
  if (ok) {
    btn.textContent = '✓ Salvo!';
    btn.className = 'btn-salvar ok';
    msg.textContent = '✓ Salvo no dispositivo';
    msg.style.display = 'block';
  } else {
    btn.textContent = '⚠ Erro ao salvar';
    msg.textContent = '⚠ Erro — tente novamente';
    msg.style.display = 'block';
  }
  setTimeout(function(){ btn.textContent = 'Salvar alterações'; btn.className = 'btn-salvar'; msg.style.display = 'none'; }, 2500);
}

function limpar() {
  document.getElementById('inp').value = '';
  document.getElementById('btnLimpar').style.display = 'none';
  document.getElementById('sugg').innerHTML = '';
  showEmpty();
  setTimeout(function(){ document.getElementById('inp').focus(); }, 100);
}

document.getElementById('inp').addEventListener('keydown', function(e){ if(e.key==='Enter') buscar(); });
document.getElementById('inp').addEventListener('input', function(){
  var q = this.value.trim();
  var el = document.getElementById('sugg');
  if (q.length < 2) { el.innerHTML = ''; return; }
  var sugg = findSugg(q);
  el.innerHTML = sugg.map(function(s){ return '<span onclick="selSugg(\''+s+'\')">' + s + '</span>'; }).join('');
});

loadDB();
</script>

</body></html>
