<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💰 William Gold</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a14; color: #e8e8e8; min-height: 100vh; }

.topbar { background: #111122; border-bottom: 1px solid #2a2a3a; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 12px; color: #c8a96e; letter-spacing: 1px; font-weight: 700; }
.clock { font-size: 17px; font-weight: 700; color: #c8a96e; font-variant-numeric: tabular-nums; }

.server-bar { display: flex; background: #0d0d1a; border-bottom: 1px solid #2a2a3a; position: sticky; top: 37px; z-index: 99; }
.srv-btn { flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; color: #555; transition: all 0.2s; }
.srv-btn.active-eu       { color: #90EE90; border-color: #90EE90; background: #0f1a0f; }
.srv-btn.active-america  { color: #87CEFA; border-color: #87CEFA; background: #0f141a; }
.srv-btn.active-murica   { color: #ff9944; border-color: #ff9944; background: #1a120a; }

.container { padding: 10px; max-width: 480px; margin: 0 auto; }

.card { background: #141424; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.card-title { font-size: 11px; font-weight: 700; color: #c8a96e; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.login-overlay { position: fixed; inset: 0; background: #0a0a14; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: #141424; border: 1px solid #2a2a3a; border-radius: 16px; padding: 28px 22px; width: 100%; max-width: 320px; text-align: center; }
.login-box h2 { font-size: 15px; color: #c8a96e; letter-spacing: 1px; margin-bottom: 4px; }
.login-box p { font-size: 11px; color: #666; margin-bottom: 18px; }
.login-box input { width: 100%; background: #1a1a2e; border: 1px solid #333; border-radius: 10px; padding: 11px 12px; font-size: 14px; color: #e8e8e8; outline: none; font-family: inherit; margin-bottom: 10px; }
.login-box input:focus { border-color: #c8a96e; }
.login-box button { width: 100%; background: #c8a96e; color: #111; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.login-box button:disabled { opacity: 0.6; }
.login-error { font-size: 11px; color: #ff6666; margin-top: 10px; min-height: 14px; }
</style>
</head>
<body>
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>⚔ WILLIAM</h2>
    <p>Acesso restrito — entre com sua conta</p>
    <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="username">
    <input type="password" id="loginSenha" placeholder="Senha" autocomplete="current-password">
    <button id="loginBtn">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>


<div class="topbar">
  <h1>⚔ WILLIAM — GOLD</h1>
  <div class="clock" id="clock">00:00</div>
</div>

<div class="server-bar">
  <div class="srv-btn" id="srv-eu"      onclick="setServer('eu')">🇪🇺 EU</div>
  <div class="srv-btn" id="srv-america" onclick="setServer('america')">🇺🇸 América</div>
  <div class="srv-btn" id="srv-murica"  onclick="setServer('murica')">💀 Murica</div>
</div>

<div class="container" id="main"></div>

<script>
// ══════════════════════════════════════════════════════
// PERSONAGENS PADRÃO (usados só pro seletor "farmando")
// ══════════════════════════════════════════════════════
var EU_CHARS_DEFAULT = [
  {nome:'Archlord',  cat:'Principal'},
  {nome:'Baygon',    cat:'Principal'},
  {nome:'Maditau',   cat:'Principal'},
  {nome:'Varian',    cat:'Principal'},
  {nome:'Mxyzptlk',  cat:'Intermediário'},
];

var KEY = 'william_superapp_v1'; // mesma chave do SuperApp — dados ficam sincronizados
var server = 'eu';

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
function loadState() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }
function saveState(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e) {} }

function getChars() {
  var s = loadState(), k = server+'_chars';
  if (!s[k]) { s[k] = server==='eu' ? JSON.parse(JSON.stringify(EU_CHARS_DEFAULT)) : []; saveState(s); }
  return s[k];
}

function parsePtBrDate(str){
  var p=String(str).split('/');
  return new Date(Number(p[2]),Number(p[1])-1,Number(p[0]));
}

function getGoldState() {
  var s = loadState(), k = server+'_gold';
  var hoje = new Date().toLocaleDateString('pt-BR');
  var mudou = false;
  if (!s[k]) { s[k] = { total:0, historico:[], data: hoje, diario: [] }; mudou = true; }
  if (!s[k].diario) { s[k].diario = []; mudou = true; }
  if (s[k].data !== hoje && parsePtBrDate(s[k].data) < parsePtBrDate(hoje)) {
    // O dia realmente já passou (data guardada é anterior à de hoje) — fecha e começa do zero.
    // Se a data guardada for FUTURA (ex: simulação de teste), não mexe em nada.
    syncDiario(s[k]);
    s[k].total = 0;
    s[k].historico = [];
    s[k].data = hoje;
    syncDiario(s[k]);
    mudou = true;
  }
  if (mudou) saveState(s); // só grava (e sincroniza) quando algo de fato mudou
  return s[k];
}
function setGoldState(data) { var s=loadState(); s[server+'_gold']=data; saveState(s); }

// Mantém o histórico dos últimos 7 dias sempre sincronizado com o total do dia atual.
// Enquanto o dia não vira, essa entrada "hoje" acompanha ao vivo qualquer depósito, desfazer ou zerar.
function syncDiario(gs){
  if(!gs.diario) gs.diario=[];
  var idx=gs.diario.findIndex(function(d){return d.data===gs.data;});
  if(idx>=0) gs.diario[idx].total=gs.total;
  else gs.diario.unshift({data:gs.data,total:gs.total});
  gs.diario=gs.diario.slice(0,7);
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function el(tag,cls,txt){var e=document.createElement(tag);e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function vibe(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
function tick(){var n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
tick(); setInterval(tick,10000);

function setServer(sv) {
  server = sv;
  document.querySelectorAll('.srv-btn').forEach(function(b){ b.className='srv-btn'; });
  document.getElementById('srv-'+sv).className='srv-btn active-'+sv;
  render();
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render(){
  var main = document.getElementById('main');
  main.innerHTML = '';
  renderGold(main);
}

function renderGold(main) {
  var gs = getGoldState();
  var hoje = new Date().toLocaleDateString('pt-BR');

  if (gs.data !== hoje) {
    var warn=document.createElement('div');
    warn.style.cssText='background:#2a1a0a;border:1px solid #ff9944;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#ffb066;';
    warn.innerHTML='⚠️ O contador está registrando em <b>'+gs.data+'</b>, mas hoje é <b>'+hoje+'</b>.';
    var fixBtn=document.createElement('button');
    fixBtn.textContent='Corrigir pra data de hoje';
    fixBtn.style.cssText='width:100%;margin-top:8px;padding:8px;background:#1a1a2a;border:1px solid #ff9944;border-radius:8px;color:#ffb066;font-size:12px;font-weight:700;cursor:pointer;';
    fixBtn.onclick=function(){ var gs2=getGoldState(); gs2.data=hoje; setGoldState(gs2); render(); };
    warn.appendChild(fixBtn);
    main.appendChild(warn);
  }

  var card = document.createElement('div'); card.className='card';

  var title = el('div','card-title','💰 CONTADOR DE GOLD — '+hoje);
  card.appendChild(title);

  var totalBox = document.createElement('div');
  totalBox.style.cssText = 'background:#1a2a0a;border:2px solid #c8a96e;border-radius:14px;padding:18px;text-align:center;margin-bottom:14px;';
  var totalLabel = el('div','',  'Total do dia');
  totalLabel.style.cssText = 'font-size:11px;color:#888;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;';
  var totalVal = el('div','', formatGold(gs.total));
  totalVal.style.cssText = 'font-size:36px;font-weight:800;color:#FFD700;letter-spacing:1px;';
  totalBox.appendChild(totalLabel); totalBox.appendChild(totalVal);
  card.appendChild(totalBox);

  var chars = getChars().filter(function(c){ return c.cat==='Principal'||c.cat==='Intermediário'; });
  var charLabel = el('div','','👤 Personagem farmando:');
  charLabel.style.cssText = 'font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;';
  card.appendChild(charLabel);

  var sel = document.createElement('select');
  sel.id = 'goldChar';
  sel.style.cssText = 'width:100%;background:#1a1a2e;border:1px solid #333;border-radius:10px;padding:10px 12px;font-size:14px;color:#e8e8e8;outline:none;font-family:inherit;margin-bottom:10px;';
  var defOpt = document.createElement('option'); defOpt.value=''; defOpt.textContent='Selecione...';
  sel.appendChild(defOpt);
  chars.forEach(function(c){
    var opt = document.createElement('option'); opt.value=c.nome; opt.textContent=c.nome+' ('+c.cat+')';
    if(c.nome==='Mxyzptlk') opt.selected=true;
    sel.appendChild(opt);
  });
  if(chars.length===0){
    var opt2=document.createElement('option'); opt2.value='Manual'; opt2.textContent='Digitar manualmente'; sel.appendChild(opt2);
  }
  card.appendChild(sel);

  var addLabel = el('div','','💎 Valor depositado:');
  addLabel.style.cssText = 'font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;';
  card.appendChild(addLabel);

  var inputRow = document.createElement('div');
  inputRow.style.cssText = 'display:flex;gap:8px;margin-bottom:10px;';
  var goldInput = document.createElement('input');
  goldInput.id='goldInput'; goldInput.type='text'; goldInput.inputMode='numeric'; goldInput.placeholder='Ex: 90.000.000';
  goldInput.style.cssText='flex:1;background:#1a1a2e;border:1px solid #c8a96e;border-radius:10px;padding:12px;font-size:16px;color:#FFD700;outline:none;font-family:inherit;text-align:center;';
  goldInput.addEventListener('keydown',function(e){if(e.key==='Enter')addGold();});
  var addBtn = document.createElement('button');
  addBtn.textContent='＋'; addBtn.style.cssText='background:#c8a96e;color:#111;border:none;border-radius:10px;padding:12px 20px;font-size:22px;font-weight:700;cursor:pointer;';
  addBtn.onclick=addGold;
  inputRow.appendChild(goldInput); inputRow.appendChild(addBtn);
  card.appendChild(inputRow);

  var resetRow = document.createElement('div');
  resetRow.style.cssText='display:flex;gap:8px;margin-bottom:14px;';
  var resetBtn=document.createElement('button');
  resetBtn.textContent='↺ Zerar dia'; resetBtn.style.cssText='flex:1;padding:10px;background:#1a0f0f;border:1px solid #aa3333;border-radius:10px;color:#ff6666;font-size:13px;font-weight:600;cursor:pointer;';
  resetBtn.onclick=function(){ if(confirm('Zerar o contador de gold de hoje?')){ var gs2=getGoldState(); gs2.total=0; gs2.historico=[]; syncDiario(gs2); setGoldState(gs2); render(); } };
  var undoBtn=document.createElement('button');
  undoBtn.textContent='↩ Desfazer'; undoBtn.style.cssText='flex:1;padding:10px;background:#1a1a2a;border:1px solid #555;border-radius:10px;color:#aaa;font-size:13px;font-weight:600;cursor:pointer;';
  undoBtn.onclick=function(){
    var gs2=getGoldState();
    if(gs2.historico.length===0){alert('Nada pra desfazer!');return;}
    var last=gs2.historico.pop(); gs2.total-=last.valor;
    if(gs2.total<0)gs2.total=0;
    syncDiario(gs2);
    setGoldState(gs2); render();
  };
  resetRow.appendChild(undoBtn); resetRow.appendChild(resetBtn);
  card.appendChild(resetRow);

  if(gs.historico.length>0){
    var hTitle=el('div','card-title','📋 Depósitos de hoje');
    card.appendChild(hTitle);
    var hList=document.createElement('div');
    var rev=[].concat(gs.historico).reverse().slice(0,10);
    rev.forEach(function(h,i){
      var hRow=document.createElement('div');
      hRow.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:#0f0f1e;border-radius:8px;margin-bottom:5px;border:1px solid #2a2a3a;';
      var left=document.createElement('div');
      left.innerHTML='<div style="font-size:12px;font-weight:600;color:#c8a96e;">'+h.char+'</div><div style="font-size:10px;color:#555;">'+h.hora+'</div>';
      var right=el('div','','+ '+formatGold(h.valor));
      right.style.cssText='font-size:14px;font-weight:700;color:#FFD700;';
      hRow.appendChild(left); hRow.appendChild(right); hList.appendChild(hRow);
    });
    card.appendChild(hList);
  } else {
    var empty=el('div','','Nenhum depósito ainda hoje. Bora farmar! ⚔️');
    empty.style.cssText='text-align:center;color:#555;font-size:13px;padding:16px;';
    card.appendChild(empty);
  }

  main.appendChild(card);

  // Histórico dos últimos 7 dias
  var diario=gs.diario||[];
  if(diario.length>0){
    var dCard=document.createElement('div'); dCard.className='card';
    dCard.appendChild(el('div','card-title','📅 HISTÓRICO — ÚLTIMOS 7 DIAS'));
    diario.forEach(function(d,i){
      var isHoje=(d.data===hoje);
      var dRow=document.createElement('div');
      dRow.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:'+(isHoje?'#1a1608':'#0f0f1e')+';border-radius:8px;margin-bottom:5px;border:1px solid '+(isHoje?'#c8a96e':'#2a2a3a')+';gap:8px;';
      var left=el('div','',(isHoje?'🟢 Hoje — ':'')+d.data);
      left.style.cssText='font-size:12px;font-weight:600;color:'+(isHoje?'#c8a96e':'#aaa')+';flex:1;';
      var right=el('div','',formatGold(d.total));
      right.style.cssText='font-size:15px;font-weight:800;color:#FFD700;';
      var delBtn=document.createElement('button');
      delBtn.textContent='✕';
      delBtn.title='Apagar essa linha do histórico';
      delBtn.style.cssText='background:none;border:none;color:#555;font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0;';
      delBtn.onclick=(function(dataAlvo){ return function(){
        if(!confirm('Apagar o histórico de '+dataAlvo+'?')) return;
        var gs2=getGoldState();
        gs2.diario=(gs2.diario||[]).filter(function(x){return x.data!==dataAlvo;});
        setGoldState(gs2); render();
      };})(d.data);
      dRow.appendChild(left); dRow.appendChild(right); dRow.appendChild(delBtn); dCard.appendChild(dRow);
    });
    main.appendChild(dCard);
  }
}

function parseGoldInput(str){
  if(!str) return 0;
  var s=String(str).trim().replace(/[^\d.,]/g,'');
  if(!s) return 0;
  var decimals='';
  var m=s.match(/,(\d{1,2})$/);
  if(m){ decimals='.'+m[1]; s=s.slice(0,m.index); }
  s=s.replace(/[.,]/g,'');
  var n=parseFloat(s+decimals);
  return isNaN(n)?0:n;
}

function addGold(){
  var val=parseGoldInput(document.getElementById('goldInput').value);
  var charName=document.getElementById('goldChar').value||'Personagem';
  if(!val||val<=0){alert('Digite um valor válido!');return;}
  var gs=getGoldState();
  var hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  gs.total+=val;
  gs.historico.push({char:charName,valor:val,hora:hora});
  syncDiario(gs);
  setGoldState(gs);
  vibe([30]);
  render();
}

function formatGold(n){
  return Math.round(n).toLocaleString('pt-BR');
}

// INIT
document.getElementById('srv-eu').className='srv-btn active-eu';
render();
</script>



<!-- 🔄 SINCRONIZAÇÃO EM NUVEM (Firebase) + LOGIN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNKjp7hLNK6mzAX2GK49WEZq-NKgQ9o5Y",
  authDomain: "williamapp-31dff.firebaseapp.com",
  projectId: "williamapp-31dff",
  storageBucket: "williamapp-31dff.firebasestorage.app",
  messagingSenderId: "171912065024",
  appId: "1:171912065024:web:9c47f66f4b8e7fc727a8e5"
};

const ALLOWED_EMAIL = "marcelodossantosfc@gmail.com";

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const docRef = doc(db, "william", "state");

var overlay = document.getElementById('loginOverlay');
var emailIn = document.getElementById('loginEmail');
var senhaIn = document.getElementById('loginSenha');
var loginBtn = document.getElementById('loginBtn');
var errEl = document.getElementById('loginError');

function showError(msg){ errEl.textContent = msg; }

function tryLogin(){
  var email = emailIn.value.trim();
  var senha = senhaIn.value;
  if(!email || !senha){ showError('Preencha e-mail e senha.'); return; }
  loginBtn.disabled = true; loginBtn.textContent = 'Entrando...';
  showError('');
  signInWithEmailAndPassword(auth, email, senha)
    .catch(function(e){
      loginBtn.disabled = false; loginBtn.textContent = 'Entrar';
      showError('E-mail ou senha incorretos.');
    });
}
loginBtn.onclick = tryLogin;
senhaIn.addEventListener('keydown', function(e){ if(e.key==='Enter') tryLogin(); });
emailIn.addEventListener('keydown', function(e){ if(e.key==='Enter') senhaIn.focus(); });

window._applyingRemote = false;
var _pendingRemote = null;
var _saveTimeout = null;

function isTypingNow(){
  var ae = document.activeElement;
  return ae && (ae.tagName==='INPUT' || ae.tagName==='TEXTAREA' || ae.tagName==='SELECT');
}

function applyRemote(remoteStr){
  if (isTypingNow()) { _pendingRemote = remoteStr; return; }
  window._applyingRemote = true;
  localStorage.setItem(window.KEY || 'william_superapp_v1', remoteStr);
  window._applyingRemote = false;
  if (typeof window.render === 'function') window.render();
}

// Se o usuário estava digitando quando chegou uma atualização, aplica assim que ele sair do campo
document.addEventListener('focusout', function(){
  if (_pendingRemote) {
    var p = _pendingRemote; _pendingRemote = null;
    setTimeout(function(){ applyRemote(p); }, 200);
  }
});

var _origSaveState = window.saveState;
window.saveState = function(s) {
  _origSaveState(s);
  if (!window._applyingRemote && auth.currentUser && auth.currentUser.email === ALLOWED_EMAIL) {
    clearTimeout(_saveTimeout);
    _saveTimeout = setTimeout(function(){
      setDoc(docRef, s).catch(function(e){ console.error('Erro ao sincronizar:', e); });
    }, 600);
  }
};

var unsubscribe = null;

onAuthStateChanged(auth, function(user){
  if (user && user.email === ALLOWED_EMAIL) {
    overlay.style.display = 'none';
    loginBtn.disabled = false; loginBtn.textContent = 'Entrar';

    if (!unsubscribe) {
      unsubscribe = onSnapshot(docRef, function(snap){
        if (!snap.exists()) { setDoc(docRef, window.loadState()); return; }
        var remoteStr = JSON.stringify(snap.data());
        var localStr = JSON.stringify(window.loadState());
        if (localStr === remoteStr) return;
        applyRemote(remoteStr);
      }, function(err){ console.error('Erro de sincronização:', err); });
    }
  } else if (user && user.email !== ALLOWED_EMAIL) {
    signOut(auth);
    overlay.style.display = 'flex';
    showError('Conta não autorizada.');
  } else {
    overlay.style.display = 'flex';
  }
});
</script>

</body>
</html>
