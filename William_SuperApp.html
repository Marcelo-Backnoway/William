<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔ William SuperApp</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a14; color: #e8e8e8; min-height: 100vh; }

/* TOPBAR */
.topbar { background: #111122; border-bottom: 1px solid #2a2a3a; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 11px; color: #c8a96e; letter-spacing: 1px; font-weight: 700; }
.top-right { display: flex; align-items: center; gap: 8px; }
.clock { font-size: 17px; font-weight: 700; color: #c8a96e; font-variant-numeric: tabular-nums; }
.wakelock-btn { font-size: 15px; cursor: pointer; opacity: 0.4; background: none; border: none; padding: 2px; }
.wakelock-btn.active { opacity: 1; }

/* SERVIDOR SELECTOR */
.server-bar { display: flex; background: #0d0d1a; border-bottom: 1px solid #2a2a3a; }
.srv-btn { flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; color: #555; transition: all 0.2s; }
.srv-btn.active-eu       { color: #90EE90; border-color: #90EE90; background: #0f1a0f; }
.srv-btn.active-america  { color: #87CEFA; border-color: #87CEFA; background: #0f141a; }
.srv-btn.active-murica   { color: #ff9944; border-color: #ff9944; background: #1a120a; }

/* ABAS */
.tabs { display: flex; background: #0a0a12; border-bottom: 1px solid #1a1a2a; }
.tab { flex: 1; padding: 8px 2px; text-align: center; font-size: 10px; font-weight: 700; cursor: pointer; border-bottom: 2px solid transparent; color: #444; transition: all 0.2s; }
.tab.active { color: #c8a96e; border-color: #c8a96e; }

.container { padding: 10px; max-width: 480px; margin: 0 auto; }

/* CARDS GERAIS */
.card { background: #141424; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.card-title { font-size: 11px; font-weight: 700; color: #c8a96e; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

/* ══════════════════════════════
   ABA ILHAS
══════════════════════════════ */
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; }
.fcard { background: #141424; border: 1px solid #2a2a3a; border-radius: 12px; padding: 10px 6px 8px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
.fcard.full { border-color: #ff4444; background: #1a0f0f; }
.fcard.almostfull { border-color: #ffa500; background: #1a150a; }
@keyframes pulse { 0%,100%{border-color:#ff4444} 50%{border-color:#ff0000;box-shadow:0 0 10px #ff000055} }
.fcard.pulse { animation: pulse 0.8s ease-in-out 3; }
.flabel { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.flabel.refinados { color: #c8a96e; }
.flabel.elite     { color: #ff9944; }
.flabel.compose   { color: #88ddff; }
.progress-bar { width: 100%; height: 3px; background: #2a2a3a; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.progress-fill.refinados { background: #c8a96e; }
.progress-fill.elite     { background: #ff9944; }
.big-num { font-size: 34px; font-weight: 800; line-height: 1; }
.char-name-ilha { font-size: 10px; text-align: center; font-weight: 600; }
.remaining { font-size: 10px; font-weight: 700; }
.status-msg { font-size: 9px; font-weight: 700; color: #ff4444; }
.compose-slots { width: 100%; display: flex; flex-direction: column; gap: 2px; }
.compose-row { display: flex; align-items: center; gap: 4px; padding: 3px 4px; border-radius: 6px; background: #1e1e30; }
.compose-row.atual { background: #1a2a1a; border: 1px solid #55aa55; }
.compose-row.cheio { opacity: 0.4; }
.compose-num  { font-size: 12px; font-weight: 700; min-width: 18px; text-align: center; flex-shrink: 0; }
.compose-nome { font-size: 9px; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 600; }
.compose-tag  { font-size: 7px; padding: 1px 3px; border-radius: 3px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.tag-atual { background:#55aa55;color:#fff; }
.tag-cheio { background:#aa3333;color:#fff; }
.tag-livre { background:#333;color:#888; }

/* PAINEL INFERIOR ILHAS */
.info-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 6px; }
.info-card { background: #0f0f1e; border: 1px solid #2a2a3a; border-radius: 10px; padding: 8px 6px; display: flex; flex-direction: column; gap: 4px; }
.info-ilha-label { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #555; }
.info-charname { font-size: 11px; font-weight: 700; text-align: center; min-height: 16px; }
.info-row { display: flex; align-items: center; gap: 3px; }
.info-row span { font-size: 10px; color: #c8a96e; font-weight: 700; white-space: nowrap; }
.info-input { flex: 1; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; padding: 5px 4px; font-size: 13px; color: #e8e8e8; outline: none; width: 100%; font-family: inherit; text-align: center; }
.info-input:focus { border-color: #c8a96e; }
.info-login-row { display: flex; align-items: center; gap: 3px; }
.info-login-row span { font-size: 10px; color: #87CEFA; font-weight: 700; }

/* ILHA TABS */
.ilha-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.ilha-tab { flex: 1; padding: 7px 4px; text-align: center; font-size: 11px; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: all 0.2s; background: #1a1a2a; color: #555; }
.ilha-tab.active-rigel    { background: #0f1a0f; color: #90EE90; border: 1px solid #90EE90; }
.ilha-tab.active-scorpius { background: #0f141a; color: #87CEFA; border: 1px solid #87CEFA; }
.ilha-tab.active-hubble   { background: #150f1a; color: #DDA0DD; border: 1px solid #DDA0DD; }

/* ══════════════════════════════
   ABA PERSONAGENS
══════════════════════════════ */
.char-nav-card { background: #141424; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.char-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.char-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; background: #1a1a2e; border: 2px solid #c8a96e; color: #c8a96e; }
.char-title { flex: 1; }
.char-title .nome { font-size: 17px; font-weight: 700; color: #e8e8e8; }
.char-title .cat  { font-size: 10px; color: #888; margin-top: 2px; }
.char-counter { font-size: 11px; color: #555; }

.char-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.char-field { display: flex; align-items: center; gap: 8px; background: #0f0f1e; border-radius: 10px; padding: 10px 12px; border: 1px solid #2a2a3a; }
.char-field-label { font-size: 12px; font-weight: 700; min-width: 60px; }
.char-field-label.lv  { color: #c8a96e; }
.char-field-label.lg  { color: #87CEFA; }
.char-field-label.bk  { color: #74c69d; }
.char-field-input { flex: 1; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 8px 10px; font-size: 14px; color: #e8e8e8; outline: none; font-family: inherit; }
.char-field-input:focus { border-color: #c8a96e; }

.char-nav-row { display: flex; gap: 6px; }
.btn-nav-char { flex: 1; padding: 11px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.btn-nav-char:active { transform: scale(0.93); }
.btn-prev-char { background: #2a2a3a; color: #aaa; }
.btn-next-char { background: #c8a96e; color: #111; }

.cat-section { margin-bottom: 4px; }
.cat-label { font-size: 10px; color: #555; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 0 4px; }

.add-char-card { background: #141424; border: 1px dashed #333; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.add-char-title { font-size: 12px; color: #c8a96e; font-weight: 700; margin-bottom: 10px; }
.add-field { margin-bottom: 8px; }
.add-field label { font-size: 10px; color: #666; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.add-field input, .add-field select { width: 100%; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 9px 10px; font-size: 13px; color: #e8e8e8; outline: none; font-family: inherit; }
.add-field input:focus, .add-field select:focus { border-color: #c8a96e; }
.btn-add-char { width: 100%; padding: 12px; background: #c8a96e; color: #111; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.btn-del-char { background: none; border: none; color: #444; font-size: 18px; cursor: pointer; padding: 2px 6px; }

/* ══════════════════════════════
   ABA DASHBOARD
══════════════════════════════ */
.cal-grid-wrap { overflow-x: auto; }
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.month-nav button { background: #2a2a3a; border: none; color: #c8a96e; font-size: 16px; padding: 4px 10px; border-radius: 8px; cursor: pointer; }
.month-title { font-size: 13px; font-weight: 700; color: #e8e8e8; }
.weekdays { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; margin-bottom: 3px; }
.weekday { font-size: 9px; color: #555; text-align: center; font-weight: 700; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-day { aspect-ratio: 1; border-radius: 7px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.cal-day:active { transform: scale(0.88); }
.cal-day.empty { background: transparent; cursor: default; }
.cal-day.work   { background: #1a2a3a; color: #87CEFA; border: 1px solid #2a4a6a; }
.cal-day.folga  { background: #1a0a0a; color: #ff6666; border: 1px solid #6a2a2a; }
.cal-day.ferias { background: #2a1a3a; color: #DDA0DD; border: 1px solid #4a2a6a; }
.cal-day.aniv   { background: #3a2a0a; color: #FFD700; border: 2px solid #c8a96e; }
.cal-day.today  { border: 2px solid #c8a96e !important; }
.cal-day.past   { opacity: 0.4; }
.cal-icon { font-size: 7px; line-height: 1; }
.legend { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: #888; }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

.conta-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #0f0f1e; border-radius: 10px; margin-bottom: 7px; border: 1px solid #2a2a3a; cursor: pointer; }
.conta-item.pago { border-color: #2d6a4f; background: #0f1a14; }
.conta-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.conta-item.pago .conta-check { background: #2d6a4f; border-color: #2d6a4f; }
.conta-info { flex: 1; }
.conta-nome { font-size: 13px; font-weight: 600; }
.conta-item.pago .conta-nome { color: #74c69d; }
.conta-venc { font-size: 10px; color: #666; margin-top: 1px; }
.conta-valor { font-size: 13px; font-weight: 700; color: #c8a96e; }
.conta-item.pago .conta-valor { color: #74c69d; }
.resumo-contas { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
.resumo-box { background: #0f0f1e; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #2a2a3a; }
.resumo-box .rlabel { font-size: 10px; color: #666; margin-bottom: 3px; }
.resumo-box .rval { font-size: 15px; font-weight: 700; }
.resumo-box.pago .rval { color: #74c69d; }
.resumo-box.pend .rval { color: #ff9944; }
.edit-conta { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 7px 10px; font-size: 13px; color: #e8e8e8; outline: none; width: 100%; font-family: inherit; margin-top: 3px; }
.edit-conta:focus { border-color: #c8a96e; }
.mes-selector { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.mes-selector button { background: #2a2a3a; border: none; color: #c8a96e; font-size: 16px; padding: 4px 10px; border-radius: 8px; cursor: pointer; }
.mes-label { font-size: 14px; font-weight: 700; }

.obj-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #0f0f1e; border-radius: 10px; margin-bottom: 7px; border: 1px solid #2a2a3a; }
.obj-item.done { border-color: #2d6a4f; background: #0f1a14; }
.obj-check { width: 22px; height: 22px; border-radius: 11px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; flex-shrink: 0; }
.obj-item.done .obj-check { background: #2d6a4f; border-color: #2d6a4f; }
.obj-text { flex: 1; font-size: 13px; }
.obj-item.done .obj-text { color: #74c69d; text-decoration: line-through; }
.obj-del { color: #444; font-size: 18px; cursor: pointer; padding: 4px; }
.add-row { display: flex; gap: 8px; margin-top: 8px; }
.add-input { flex: 1; background: #1a1a2e; border: 1px solid #333; border-radius: 10px; padding: 10px 12px; font-size: 13px; color: #e8e8e8; outline: none; font-family: inherit; }
.add-input:focus { border-color: #c8a96e; }
.add-btn { background: #c8a96e; color: #111; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* ══════════════════════════════
   BACKUP
══════════════════════════════ */
.backup-row { display: flex; gap: 8px; margin-top: 8px; }
.btn-export { flex: 1; padding: 12px; background: #1a2a1a; border: 1px solid #2d6a4f; border-radius: 10px; color: #74c69d; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
.btn-import { flex: 1; padding: 12px; background: #1a1a2a; border: 1px solid #444; border-radius: 10px; color: #aaa; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; }
.drive-btn { display: block; width: 100%; padding: 12px; background: #1a1a2a; border: 1px solid #4285f4; border-radius: 10px; color: #4285f4; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 8px; text-decoration: none; }

/* BOTOES GERAIS */
.btn-add-mula { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:13px; background:linear-gradient(135deg,#1a2a1a,#0f1a0f); border:2px solid #90EE90; border-radius:12px; color:#90EE90; font-size:14px; font-weight:700; cursor:pointer; margin-bottom:10px; }
.btn-add-mula:active { opacity:0.7; transform:scale(0.97); }
.distrib-card { background:#0f1a0f; border:1px solid #2a4a2a; border-radius:12px; padding:14px; margin-bottom:10px; }
.distrib-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #1a2a1a; font-size:12px; }
.distrib-row:last-child { border-bottom:none; }
.distrib-label { color:#888; }
.distrib-val { font-weight:700; color:#90EE90; }
.btn-reset { display: block; width: 100%; padding: 10px; background: #1a1a2a; border: 1px solid #333; border-radius: 10px; color: #555; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; margin-bottom: 8px; }
button:active { opacity: 0.7; transform: scale(0.97); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: #000000cc; z-index: 300; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #141424; border: 1px solid #2a2a3a; border-radius: 16px; padding: 20px; width: calc(100% - 32px); max-width: 400px; }
.modal h3 { color: #c8a96e; font-size: 14px; margin-bottom: 12px; }
.modal textarea { width: 100%; background: #0a0a14; border: 1px solid #333; border-radius: 8px; color: #e8e8e8; font-size: 11px; padding: 10px; height: 130px; resize: none; font-family: monospace; outline: none; }
.modal-btns { display: flex; gap: 8px; margin-top: 12px; }
.modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
.modal-ok { background: #c8a96e; color: #111; }
.modal-cancel { background: #2a2a3a; color: #aaa; }
</style>
</head>

<div class="topbar">
  <h1>⚔ WILLIAM SUPERAPP</h1>
  <div class="top-right">
    <button class="wakelock-btn" id="wlBtn" onclick="toggleWakeLock()" title="Tela sempre ligada">💡</button>
    <div class="clock" id="clock">00:00</div>

</div>

<!-- SELETOR DE SERVIDOR -->
<div class="server-bar">
  <div class="srv-btn" id="srv-eu"      onclick="setServer('eu')">🇪🇺 EU</div>
  <div class="srv-btn" id="srv-america" onclick="setServer('america')">🇺🇸 América</div>
  <div class="srv-btn" id="srv-murica"  onclick="setServer('murica')">💀 Murica</div>
</div>

<!-- ABAS -->
<div class="tabs">

  <div class="tab" onclick="setTab('dash')">📅 Agenda</div>
  <div class="tab" onclick="setTab('gold')">💰 Gold</div>
  <div class="tab" onclick="setTab('tutorial')">📖 Ajuda</div>
  <div class="tab" onclick="setTab('backup')">💾 Backup</div>
</div>

<div class="container" id="main"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <textarea id="modalText"></textarea>
    <div class="modal-btns">
      <button class="modal-ok" id="modalOk">OK</button>
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

function loadState() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }
function saveState(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e) {} }

function getIlhaState(isl) {
  var s = loadState(), k = server+'_ilha_'+isl;
  if (!s[k]) s[k] = { refinados:1, elite:25, compose:{27:0,28:0,29:0,30:0}, levels:{}, bancos:{}, logins:{} };
  ['levels','bancos','logins','compose'].forEach(function(f){ if(!s[k][f]) s[k][f]={}; });
  if(!s[k].elite) s[k].elite=25;
  saveState(s); return s[k];
}
function setIlhaState(isl, st) { var s=loadState(); s[server+'_ilha_'+isl]=st; saveState(s); }

function getChars() {
  var s = loadState(), k = server+'_chars';
  if (!s[k]) { s[k] = server==='eu' ? JSON.parse(JSON.stringify(EU_CHARS_DEFAULT)) : []; saveState(s); }
  return s[k];
}
function setChars(data) { var s=loadState(); s[server+'_chars']=data; saveState(s); }

function getContas(mes,ano) {

function makeQueueCard(type, current) {
  var min={refinados:1,elite:25}[type]||1, max={refinados:24,elite:26}[type]||24;
  var isFull=current>max, isLast=current===max;
  var div=document.createElement('div');
  div.className='fcard'+(isFull?' full':isLast?' almostfull':'');
  div.appendChild(el('div','flabel '+type,type==='refinados'?'REFINADOS':'ELITE'));
  if(!isFull){ var pb=el('div','progress-bar'),pf=el('div','progress-fill '+type); pf.style.width=Math.round(((current-min)/(max-min+1))*100)+'%'; pb.appendChild(pf); div.appendChild(pb); }
  var num=el('div','big-num',isFull?'✓':String(current)); num.style.color=isFull?'#ff4444':(type==='elite'?'#ff9944':'#c8a96e'); div.appendChild(num);
  if (!isFull && server !== 'eu') {
    var cnIn = document.createElement('input');
    cnIn.className = 'info-input';
    cnIn.style.cssText = 'font-size:10px;padding:3px 4px;text-align:center;width:100%;color:#ffd88a';
    cnIn.placeholder = 'Nome slot '+current;
    cnIn.value = getIlhaNome(ilha, current) !== 'Slot '+current ? getIlhaNome(ilha, current) : '';
    cnIn.dataset.slot = current;
    cnIn.onchange = (function(sl, isl){ return function(){ setIlhaNome(isl, sl, this.value); }; })(current, ilha);
    div.appendChild(cnIn);
  } else {
    var cn=el('div','char-name-ilha',isFull?'Cheias!':getIlhaNome(ilha,current));
    if(!isFull) cn.style.color=type==='refinados'?'#ffd88a':'#ffb066';
    div.appendChild(cn);
  }
  if(!isFull){ var rem=max-current; var re=el('div','remaining',rem===0?'⚠ ÚLTIMA!':rem+' rest.'); re.style.color=rem===0?'#ff4444':rem<=3?'#ffa500':'#a0b8d0'; div.appendChild(re); }
  else div.appendChild(el('div','status-msg','CHEIAS'));
  var br=document.createElement('div'); br.className='grid'; br.style.cssText='grid-template-columns:1fr 1fr;gap:4px;width:100%';
  var prev=btn('◀','btn-nav-char btn-prev-char',function(){ navIlha(type,-1); }); prev.disabled=current<=min;
  br.appendChild(prev); br.appendChild(btn(isFull?'↺':'▶','btn-nav-char btn-next-char',function(){ navIlha(type,1); }));
  div.appendChild(br); return div;
}

function makeComposeCard(composeState) {
  var slots=[27,28,29,30], allFull=slots.every(function(s){ return composeState[s]===1; });
  var atual=slots.find(function(s){ return composeState[s]!==1; });
  var div=document.createElement('div'); div.className='fcard'+(allFull?' full':'');
  div.appendChild(el('div','flabel compose','COMPOSE'));
  var sd=document.createElement('div'); sd.className='compose-slots';
  slots.forEach(function(s){
    var isCheio=composeState[s]===1, isAtual=s===atual;
    var row=document.createElement('div'); row.className='compose-row'+(isAtual?' atual':'')+(isCheio?' cheio':'');
    var num=el('div','compose-num',String(s)); num.style.color=isCheio?'#555':isAtual?'#90ee90':'#87cefa';
    var nome;
    if (server !== 'eu') {
      nome = document.createElement('input');
      nome.className = 'compose-nome';
      nome.style.cssText = 'background:#0a0a14;border:none;color:'+(isCheio?'#555':isAtual?'#90ee90':'#87cefa')+';font-size:9px;width:100%;outline:none;';
      nome.placeholder = 'Slot '+s;
      var savedNome = getIlhaNome(ilha, s);
      nome.value = savedNome !== 'Slot '+s ? savedNome : '';
      nome.onchange = (function(sl, isl){ return function(){ setIlhaNome(isl, sl, this.value); }; })(s, ilha);
    } else {
      nome = el('div','compose-nome',getIlhaNome(ilha,s));
      nome.style.color = isCheio?'#555':isAtual?'#90ee90':'#87cefa';
    }
    var tag=document.createElement('div');
    if(isCheio){tag.className='compose-tag tag-cheio';tag.textContent='✓';}
    else if(isAtual){tag.className='compose-tag tag-atual';tag.textContent='ATUAL';}
    else{tag.className='compose-tag tag-livre';tag.textContent='livre';}
    row.appendChild(num); row.appendChild(nome); row.appendChild(tag); sd.appendChild(row);
  });
  div.appendChild(sd);
  if(allFull) div.appendChild(el('div','status-msg','TODAS CHEIAS'));
  var br=document.createElement('div'); br.className='grid'; br.style.cssText='grid-template-columns:1fr 1fr;gap:4px;width:100%';
  br.appendChild(btn('◀','btn-nav-char btn-prev-char',function(){ navCompose(-1); }));
  br.appendChild(btn(allFull?'↺':'▶','btn-nav-char btn-next-char',function(){ navCompose(1); }));
  div.appendChild(br); return div;
}

function saveIlhaMeta(field, key, val) { var st=getIlhaState(ilha); st[field][key]=val; setIlhaState(ilha,st); }

function navIlha(type,dir) {
  var st=getIlhaState(ilha);
  var min={refinados:1,elite:25}[type], max={refinados:24,elite:26}[type];
  if(dir===1&&st[type]<=max) st[type]++;
  if(dir===-1&&st[type]>min) st[type]--;
  if(st[type]===max) vibe([50,30,50,30,100]);
  else vibe(dir===1?[30]:[10,10,10]);
  setIlhaState(ilha,st); render();
}
function navCompose(dir) {
  var st=getIlhaState(ilha), slots=[27,28,29,30];
  var allFull=slots.every(function(s){ return st.compose[s]===1; });
  if(dir===1){ if(allFull){ slots.forEach(function(s){st.compose[s]=0;}); vibe([10,10,10]); }
    else{ var a=slots.find(function(s){return st.compose[s]!==1;}); if(a){st.compose[a]=1;vibe([30]);} }
    if(slots.every(function(s){return st.compose[s]===1;})) vibe([50,30,50,30,100]);
  } else { var last=null; slots.forEach(function(s){if(st.compose[s]===1)last=s;}); if(last){st.compose[last]=0;vibe([10,10,10]);} }
  setIlhaState(ilha,st); render();
}
function confirmResetIlha() {
  if(confirm('Resetar '+ilha.toUpperCase()+'?')){ var s=loadState(); delete s[server+'_ilha_'+ilha]; saveState(s); vibe([20,20,20,20,50]); render(); }
}

  bkRow.appendChild(el('div','char-field-label bk','💰 Banco'));

  bkIn.value=c.banco||''; bkIn.placeholder='—';

  navCard.appendChild(del);

  renderAddChar(main, false);

function calcDistribuicao(total) {
  // Proporção fixa e determinística
  // Compose: ~13%, Elite: ~7%, Refinados: resto
  var compose = Math.max(4, Math.round(total * 0.13));
  var elite   = Math.max(2, Math.round(total * 0.07));
  var refin   = total - compose - elite;
  if (refin < 1) refin = 1;
  // Slots
  var refinStart = 1,       refinEnd = refin;
  var eliteStart = refin+1, eliteEnd = refin+elite;
  var compStart  = refin+elite+1, compEnd = total;
  return { total:total, refin:refin, elite:elite, compose:compose,
           refinStart:refinStart, refinEnd:refinEnd,
           eliteStart:eliteStart, eliteEnd:eliteEnd,
           compStart:compStart,   compEnd:compEnd };
}

function getTotalMulas(isl) {
  // Conta quantas mulas existem na ilha (slots nomeados)
  var s = loadState(), k = server+'_ilha_nomes_'+isl;
  var nomes = s[k] || {};
  // Para EU, conta os chars do ILHA_CHARS
  if (server === 'eu') return ILHA_CHARS[isl].length - 1; // -1 por causa do índice 0
  // Para outros servidores, conta os nomes salvos
  var max = 0;
  Object.keys(nomes).forEach(function(n){ if(parseInt(n)>max) max=parseInt(n); });
  return max || 0;
}

function renderDistribuicao(main, isl) {
  var total = getTotalMulas(isl);
  if (total === 0) return;
  var d = calcDistribuicao(total);
  var card = document.createElement('div'); card.className='distrib-card';
  var title = el('div','card-title','📊 Distribuição atual — '+total+' mulas');
  card.appendChild(title);
  var rows = [
    {label:'⚔️ Refinados', val:'Slots '+d.refinStart+' a '+d.refinEnd+' ('+d.refin+' mulas)'},
    {label:'⭐ Elite',      val:'Slots '+d.eliteStart+' a '+d.eliteEnd+' ('+d.elite+' mulas)'},
    {label:'💎 Compose',   val:'Slots '+d.compStart+' a '+d.compEnd+' ('+d.compose+' mulas)'},
  ];
  rows.forEach(function(r){
    var row=document.createElement('div'); row.className='distrib-row';
    row.appendChild(el('span','distrib-label',r.label));
    row.appendChild(el('span','distrib-val',r.val));
    card.appendChild(row);
  });
  main.appendChild(card);
}

  var total = getTotalMulas(isl);

  var tipo, cor;
  if (slot >= d.compStart)  { tipo='💎 Compose';   cor='#88ddff'; }
  else if (slot >= d.eliteStart) { tipo='⭐ Elite'; cor='#ff9944'; }
  else                      { tipo='⚔️ Refinado';  cor='#c8a96e'; }

  gs.historico.push({char:charName,valor:val,hora:hora});

function formatGold(n){
  if(n>=1000000) return (n/1000000).toFixed(2).replace('.',',')+'M';
  if(n>=1000) return (n/1000).toFixed(1).replace('.',',')+'k';
  return n.toLocaleString('pt-BR');
}

  var srv = {eu:'🇪🇺 EU',america:'🇺🇸 América',murica:'💀 Murica'}[server];
  card.appendChild(el('p','','\nServidor atual: '+srv+'\n'));
  var a=document.createElement('a'); a.className='drive-btn'; a.href='https://drive.google.com/drive/my-drive'; a.target='_blank'; a.textContent='📁 Google Drive — Comprovantes';
  card.appendChild(a);
  var br=document.createElement('div'); br.className='backup-row';
  br.appendChild(btn('📤 Exportar','btn-export',doExport));
  br.appendChild(btn('📥 Importar','btn-import',doImport));
  card.appendChild(br);
  card.appendChild(el('p','','\n📌 O backup inclui todos os dados do servidor atual.\nExporte e salve no WhatsApp para não perder nada!'));
  main.appendChild(card);
}
function doExport(){
  var data=JSON.stringify(loadState(),null,2);
  openModal('📤 Exportar — copie e salve no WhatsApp',data,true,'📋 Copiar & Fechar',function(){
    navigator.clipboard.writeText(data).then(function(){alert('✅ Copiado!');}).catch(function(){document.getElementById('modalText').select();document.execCommand('copy');alert('✅ Copiado!');});
    closeModal();
  });
}
function doImport(){
  openModal('📥 Importar — cole o backup aqui','',false,'✅ Restaurar',function(){
    try{var d=JSON.parse(document.getElementById('modalText').value);saveState(d);closeModal();render();alert('✅ Restaurado!');}
    catch(e){alert('❌ Texto inválido.');}
  });
}
function openModal(title,text,readOnly,okLabel,onOk){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalText').value=text;
  document.getElementById('modalText').readOnly=readOnly;
  document.getElementById('modalText').placeholder=readOnly?'':'Cole aqui o texto do backup...';
  document.getElementById('modalOk').textContent=okLabel;
  document.getElementById('modalOk').onclick=onOk;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function el(tag,cls,txt){var e=document.createElement(tag);e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function btn(txt,cls,fn){var b=document.createElement('button');b.className=cls;b.textContent=txt;b.onclick=fn;return b;}
function vibe(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
async function toggleWakeLock(){
  var b=document.getElementById('wlBtn');
  if(wakeLock){try{await wakeLock.release();}catch(e){}wakeLock=null;b.classList.remove('active');}
  else{try{wakeLock=await navigator.wakeLock.request('screen');b.classList.add('active');wakeLock.addEventListener('release',function(){wakeLock=null;b.classList.remove('active');});}catch(e){alert('WakeLock não disponível.');}}
}
function tick(){var n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
tick(); setInterval(tick,10000);

// INIT
setServer('eu');
setTab('ilhas');
</script>
