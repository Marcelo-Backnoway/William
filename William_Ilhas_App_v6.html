<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚔ Ilhas — CQ EU</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a14; color: #e8e8e8; min-height: 100vh; }

.topbar { background: #111122; border-bottom: 1px solid #2a2a3a; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 11px; color: #c8a96e; letter-spacing: 1px; font-weight: 700; }
.top-right { display: flex; align-items: center; gap: 10px; }
.clock { font-size: 18px; font-weight: 700; color: #c8a96e; font-variant-numeric: tabular-nums; }
.wakelock-btn { font-size: 16px; cursor: pointer; opacity: 0.4; transition: opacity 0.2s; background: none; border: none; padding: 2px; }
.wakelock-btn.active { opacity: 1; }

.tabs { display: flex; background: #0d0d1a; border-bottom: 1px solid #2a2a3a; }
.tab { flex: 1; padding: 9px 4px; text-align: center; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; color: #555; }
.tab.rigel.active    { color: #90EE90; border-color: #90EE90; background: #0f1a0f; }
.tab.scorpius.active { color: #87CEFA; border-color: #87CEFA; background: #0f141a; }
.tab.hubble.active   { color: #DDA0DD; border-color: #DDA0DD; background: #150f1a; }
.tab.resumo.active   { color: #c8a96e; border-color: #c8a96e; background: #1a160a; }

/* GRID 3 COLUNAS */
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 8px 6px 4px; }

.fcard { background: #141424; border: 1px solid #2a2a3a; border-radius: 12px; padding: 10px 6px 8px; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: border-color 0.3s; }
.fcard.full       { border-color: #ff4444; background: #1a0f0f; }
.fcard.almostfull { border-color: #ffa500; background: #1a150a; }
@keyframes pulse { 0%,100%{border-color:#ff4444} 50%{border-color:#ff0000;box-shadow:0 0 10px #ff000055} }
.fcard.pulse { animation: pulse 0.8s ease-in-out 3; }

.flabel { font-size: 9px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
.flabel.refinados { color: #c8a96e; }
.flabel.elite     { color: #ff9944; }
.flabel.compose   { color: #88ddff; }

.progress-bar { width: 100%; height: 3px; background: #2a2a3a; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.progress-fill.refinados { background: #c8a96e; }
.progress-fill.elite     { background: #ff9944; }

.big-num { font-size: 36px; font-weight: 800; line-height: 1; }
.char-name { font-size: 10px; text-align: center; font-weight: 600; }
.remaining { font-size: 10px; font-weight: 700; }
.status-msg { font-size: 9px; font-weight: 700; color: #ff4444; }

/* COMPOSE - compacto */
.compose-slots { width: 100%; display: flex; flex-direction: column; gap: 2px; }
.compose-row { display: flex; align-items: center; gap: 4px; padding: 3px 4px; border-radius: 6px; background: #1e1e30; }
.compose-row.atual { background: #1a2a1a; border: 1px solid #55aa55; }
.compose-row.cheio { opacity: 0.4; }
.compose-num  { font-size: 12px; font-weight: 700; min-width: 18px; text-align: center; flex-shrink: 0; }
.compose-nome { font-size: 9px; flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: 600; }
.compose-tag  { font-size: 7px; padding: 1px 3px; border-radius: 3px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
.tag-atual  { background: #55aa55; color: #fff; }
.tag-cheio  { background: #aa3333; color: #fff; }
.tag-livre  { background: #333; color: #888; }

.btn-row { display: flex; gap: 4px; width: 100%; }
.btn-nav { flex: 1; padding: 8px 2px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
.btn-nav:active { transform: scale(0.92); }
.btn-prev { background: #2a2a3a; color: #aaa; }
.btn-next { background: #c8a96e; color: #111; }
.btn-nav:disabled { background: #1a1a2a; color: #333; }

/* PAINEL INFERIOR — nome + level + banco */
.info-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 4px 6px 6px; }
.info-card { background: #0f0f1e; border: 1px solid #2a2a3a; border-radius: 10px; padding: 8px 6px; display: flex; flex-direction: column; gap: 5px; }
.info-label { font-size: 8px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #555; }
.info-charname { font-size: 11px; font-weight: 700; text-align: center; min-height: 16px; }
.info-row { display: flex; align-items: center; gap: 4px; }
.info-row span { font-size: 9px; color: #666; white-space: nowrap; }
.info-input { flex: 1; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; padding: 4px 6px; font-size: 12px; color: #e8e8e8; outline: none; width: 100%; font-family: inherit; text-align: center; }
.info-input:focus { border-color: #c8a96e; }

/* RESUMO */
.resumo-wrap { padding: 10px 8px; display: flex; flex-direction: column; gap: 10px; }
.resumo-card { background: #141424; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px; }
.resumo-title { font-size: 12px; font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
.resumo-title.rigel    { color: #90EE90; }
.resumo-title.scorpius { color: #87CEFA; }
.resumo-title.hubble   { color: #DDA0DD; }
.resumo-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #1e1e30; font-size: 12px; }
.resumo-row:last-child { border-bottom: none; }
.resumo-label { color: #888; }
.resumo-val { font-weight: 700; }
.resumo-val.alerta { color: #ff4444; }
.resumo-val.ok { color: #74c69d; }

.reset-btn { display: block; width: calc(100% - 12px); margin: 0 6px 4px; padding: 11px; background: #1a1a2a; border: 1px solid #333; border-radius: 10px; color: #666; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }

.backup-row { display: flex; gap: 6px; width: calc(100% - 12px); margin: 0 6px 12px; }
.btn-export { flex: 1; padding: 11px; background: #1a2a1a; border: 1px solid #2d6a4f; border-radius: 10px; color: #74c69d; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }
.btn-import { flex: 1; padding: 11px; background: #1a1a2a; border: 1px solid #444; border-radius: 10px; color: #aaa; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }
.btn-export:active, .btn-import:active { opacity: 0.7; }

.modal-overlay { display: none; position: fixed; inset: 0; background: #000000cc; z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #141424; border: 1px solid #2a2a3a; border-radius: 16px; padding: 20px; width: calc(100% - 40px); max-width: 400px; }
.modal h3 { color: #c8a96e; font-size: 14px; margin-bottom: 12px; }
.modal textarea { width: 100%; background: #0a0a14; border: 1px solid #333; border-radius: 8px; color: #e8e8e8; font-size: 11px; padding: 10px; height: 120px; resize: none; font-family: monospace; outline: none; }
.modal-btns { display: flex; gap: 8px; margin-top: 12px; }
.modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
.modal-btn-confirm { background: #c8a96e; color: #111; }
.modal-btn-cancel  { background: #2a2a3a; color: #aaa; }
</style>
</head>
<body>

<div class="topbar">
  <h1>⚔ ILHAS — CQ EU</h1>
  <div class="top-right">
    <button class="wakelock-btn" id="wlBtn" onclick="toggleWakeLock()" title="Manter tela ligada">💡</button>
    <div class="clock" id="clock">00:00</div>
  </div>
</div>

<div class="tabs">
  <div class="tab scorpius active" onclick="setView('scorpius')">SCORPIUS</div>
  <div class="tab rigel"          onclick="setView('rigel')">RIGEL</div>
  <div class="tab hubble"         onclick="setView('hubble')">HUBBLE</div>
  <div class="tab resumo"         onclick="setView('resumo')">📊</div>
</div>

<div id="main"></div>

<script>
var CHARS = {
  rigel:    ["","Tirisfall","Nagrand","Karazhan","Lordaeron","Andromath","Malfurion","Atiesh","Nefarian","Onyxia","Chevette","Krypton","Skylab","Santana","Sears","Zok","Goliath","Morbiduz","Gotham","Zion","Caesium137","Magneto","Rivelta","Laguna","Midfield","Outland","Azeroth","Xevious","Druaga","Autorama","Mococa"],
  scorpius: ["","Proudmoore","Lothar","Greymane","Thrall","Uther","Tyrande","Zaxxon","Falagrum","Vancleef","Michonne","Arcus","Tanaris","Cybertron","Kisuco","Shinobi","Morbidus","Overlord","Supernova","Asgard","Orion","Nucleus","Curupira","Bayonet","Sequoia","Drakkari","Corleone","Zandalar","Quake","CoolNight","Magnum"],
  hubble:   ["","Zephyr","Hyperion","Kepler","Agnus","Longest","Zenith","Capivara","Mangaba","Catarinense","Darkseid","Ultron","Samanosuke","Megalith","Mobius1","Yellow13","Vercetti","Alastor","Neville","Ancelotti","Scaloni","Sampaoli","Lakesia","Vozinha","COSIPA","Riga","Anchieta","Imigrantes","Brabham","Gardenal","Gonzaga"]
};
var RANGES = { refinados:[1,24], elite:[25,26], compose:[27,30] };
var KEY = 'cq_ilhas_v3';
var view = 'scorpius';
var wakeLock = null;

function loadState() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }
function saveState(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e) {} }

function getISL(isl) {
  var s = loadState();
  if (!s[isl]) s[isl] = { refinados:1, elite:25, compose:{27:0,28:0,29:0,30:0}, levels:{}, bancos:{} };
  if (!s[isl].levels) s[isl].levels = {};
  if (!s[isl].bancos) s[isl].bancos = {};
  if (!s[isl].elite)  s[isl].elite = 25;
  return s[isl];
}
function setISL(isl, st) { var s=loadState(); s[isl]=st; saveState(s); }
function getName(isl, n) { return (CHARS[isl] && CHARS[isl][n]) ? CHARS[isl][n] : '???'; }

function vibe(p) { try { if(navigator.vibrate) navigator.vibrate(p); } catch(e){} }

async function toggleWakeLock() {
  var btn = document.getElementById('wlBtn');
  if (wakeLock) {
    try { await wakeLock.release(); } catch(e){}
    wakeLock = null; btn.classList.remove('active');
  } else {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      btn.classList.add('active');
      wakeLock.addEventListener('release', function(){ wakeLock=null; btn.classList.remove('active'); });
    } catch(e) { alert('WakeLock não disponível.'); }
  }
}

function setView(v) {
  view = v;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelector('.tab.' + (v==='resumo'?'resumo':v)).classList.add('active');
  render();
}

function doExport() {
  var data = JSON.stringify(loadState(), null, 2);
  var modal = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = '📤 Exportar — copie e salve no WhatsApp';
  document.getElementById('modalText').value = data;
  document.getElementById('modalText').readOnly = true;
  document.getElementById('modalConfirm').textContent = '📋 Copiar & Fechar';
  document.getElementById('modalConfirm').onclick = function(){
    navigator.clipboard.writeText(data).then(function(){
      alert('✅ Copiado! Cole no WhatsApp pra você mesmo.');
    }).catch(function(){
      document.getElementById('modalText').select();
      document.execCommand('copy');
      alert('✅ Copiado!');
    });
    closeModal();
  };
  modal.classList.add('open');
}

function doImport() {
  var modal = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = '📥 Importar — cole o backup aqui';
  document.getElementById('modalText').value = '';
  document.getElementById('modalText').readOnly = false;
  document.getElementById('modalText').placeholder = 'Cole aqui o texto do backup...';
  document.getElementById('modalConfirm').textContent = '✅ Restaurar';
  document.getElementById('modalConfirm').onclick = function(){
    try {
      var data = JSON.parse(document.getElementById('modalText').value);
      saveState(data);
      closeModal();
      render();
      alert('✅ Backup restaurado com sucesso!');
    } catch(e) {
      alert('❌ Texto inválido. Verifique se copiou o backup corretamente.');
    }
  };
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function render() {
  var main = document.getElementById('main');
  main.innerHTML = '';
  if (view === 'resumo') { renderResumo(main); return; }

  var st = getISL(view);

  // Grid principal
  var grid = document.createElement('div'); grid.className = 'grid';
  grid.appendChild(makeQueueCard('refinados', st.refinados));
  grid.appendChild(makeComposeCard(st.compose));
  grid.appendChild(makeQueueCard('elite', st.elite));
  main.appendChild(grid);

  // Painel inferior: nome + level + banco
  var panel = document.createElement('div'); panel.className = 'info-panel';
  var cols = [
    {type:'refinados', cur:st.refinados, color:'#ffd88a'},
    {type:'compose',   cur: (function(){ var s=[27,28,29,30]; return s.find(function(x){ return st.compose[x]!==1; })||27; })(), color:'#a8e6c0'},
    {type:'elite',     cur:st.elite,     color:'#ffb066'}
  ];
  cols.forEach(function(col) {
    var isFull = (col.type==='refinados'&&col.cur>24)||(col.type==='elite'&&col.cur>26);
    var nome = isFull ? 'CHEIAS' : getName(view, col.cur);
    var levelKey = col.type + '_' + col.cur;
    var bancoKey = col.type + '_' + col.cur + '_banco';

    var card = document.createElement('div'); card.className = 'info-card';

    var lbl = document.createElement('div'); lbl.className = 'info-label';
    lbl.textContent = col.type === 'refinados' ? 'REFINADOS' : col.type === 'elite' ? 'ELITE' : 'COMPOSE';
    card.appendChild(lbl);

    var cn = document.createElement('div'); cn.className = 'info-charname';
    cn.style.color = isFull ? '#ff4444' : col.color;
    cn.textContent = nome;
    card.appendChild(cn);

    // Level
    var lr = document.createElement('div'); lr.className = 'info-row';
    var ls = document.createElement('span'); ls.textContent = 'Lv:';
    var li = document.createElement('input'); li.className = 'info-input'; li.type = 'number';
    li.placeholder = '—'; li.value = st.levels[levelKey] || '';
    li.dataset.key = levelKey;
    li.onchange = function(){ saveMeta('levels', this.dataset.key, this.value); };
    lr.appendChild(ls); lr.appendChild(li); card.appendChild(lr);

    // Banco
    var br2 = document.createElement('div'); br2.className = 'info-row';
    var bs = document.createElement('span'); bs.textContent = '💰';
    var bi = document.createElement('input'); bi.className = 'info-input'; bi.type = 'text';
    bi.placeholder = '—'; bi.value = st.bancos[bancoKey] || '';
    bi.dataset.key = bancoKey;
    bi.onchange = function(){ saveMeta('bancos', this.dataset.key, this.value); };
    br2.appendChild(bs); br2.appendChild(bi); card.appendChild(br2);

    panel.appendChild(card);
  });
  main.appendChild(panel);

  var rb = document.createElement('button'); rb.className = 'reset-btn';
  rb.textContent = '↺ Resetar ' + view.toUpperCase();
  rb.onclick = confirmReset;
  main.appendChild(rb);

  var brow = document.createElement('div'); brow.className = 'backup-row';
  var bexp = document.createElement('button'); bexp.className = 'btn-export';
  bexp.textContent = '📤 Exportar backup'; bexp.onclick = doExport;
  var bimp = document.createElement('button'); bimp.className = 'btn-import';
  bimp.textContent = '📥 Importar backup'; bimp.onclick = doImport;
  brow.appendChild(bexp); brow.appendChild(bimp);
  main.appendChild(brow);
}

function saveMeta(field, key, value) {
  var st = getISL(view);
  st[field][key] = value;
  setISL(view, st);
}

function makeQueueCard(type, current) {
  var min = RANGES[type][0], max = RANGES[type][1];
  var isFull = current > max;
  var isLast = current === max;
  var div = document.createElement('div');
  div.className = 'fcard'+(isFull?' full':isLast?' almostfull':'');

  div.appendChild(el('div','flabel '+type, type==='refinados'?'REFINADOS':'ELITE'));

  if (!isFull) {
    var pb = el('div','progress-bar'); var pf = el('div','progress-fill '+type);
    pf.style.width = Math.round(((current-min)/(max-min+1))*100)+'%';
    pb.appendChild(pf); div.appendChild(pb);
  }

  var num = el('div','big-num', isFull?'✓':String(current));
  num.style.color = isFull?'#ff4444':(type==='elite'?'#ff9944':'#c8a96e');
  div.appendChild(num);

  var cn = el('div','char-name', isFull?'Todas cheias!':getName(view,current));
  if(!isFull) cn.style.color = type==='refinados'?'#ffd88a':'#ffb066';
  div.appendChild(cn);

  if (!isFull) {
    var rem = max - current;
    var remEl = el('div','remaining', rem===0?'⚠ ÚLTIMA!':rem+' rest.');
    remEl.style.color = rem===0?'#ff4444':rem<=3?'#ffa500':'#a0b8d0';
    div.appendChild(remEl);
  } else {
    div.appendChild(el('div','status-msg','CHEIAS'));
  }

  var br = document.createElement('div'); br.className='btn-row';
  var prev = btn('◀','btn-nav btn-prev',function(){ navigate(type,-1); });
  prev.disabled = current<=min;
  br.appendChild(prev);
  br.appendChild(btn(isFull?'↺':'▶','btn-nav btn-next',function(){ navigate(type,1); }));
  div.appendChild(br);
  return div;
}

function makeComposeCard(composeState) {
  var slots=[27,28,29,30];
  var allFull = slots.every(function(s){ return composeState[s]===1; });
  var atual = slots.find(function(s){ return composeState[s]!==1; });
  var div = document.createElement('div');
  div.className='fcard'+(allFull?' full':'');

  div.appendChild(el('div','flabel compose','COMPOSE'));

  var sd = document.createElement('div'); sd.className='compose-slots';
  slots.forEach(function(s){
    var isCheio = composeState[s]===1;
    var isAtual = s===atual;
    var row = document.createElement('div');
    row.className='compose-row'+(isAtual?' atual':'')+(isCheio?' cheio':'');

    var num = el('div','compose-num',String(s));
    num.style.color = isCheio?'#555':isAtual?'#90ee90':'#87cefa';

    var nome = el('div','compose-nome',getName(view,s));
    nome.style.color = isCheio?'#555':isAtual?'#90ee90':'#87cefa';

    var tag = document.createElement('div');
    if(isCheio){ tag.className='compose-tag tag-cheio'; tag.textContent='✓'; }
    else if(isAtual){ tag.className='compose-tag tag-atual'; tag.textContent='ATUAL'; }
    else{ tag.className='compose-tag tag-livre'; tag.textContent='livre'; }

    row.appendChild(num); row.appendChild(nome); row.appendChild(tag);
    sd.appendChild(row);
  });
  div.appendChild(sd);

  if(allFull) div.appendChild(el('div','status-msg','TODAS CHEIAS'));

  var br=document.createElement('div'); br.className='btn-row';
  br.appendChild(btn('◀','btn-nav btn-prev',function(){ navigateCompose(-1); }));
  br.appendChild(btn(allFull?'↺':'▶','btn-nav btn-next',function(){ navigateCompose(1); }));
  div.appendChild(br);
  return div;
}

function renderResumo(main) {
  var islands=['scorpius','rigel','hubble'];
  var names={scorpius:'SCORPIUS',rigel:'RIGEL',hubble:'HUBBLE'};
  var wrap = document.createElement('div'); wrap.className='resumo-wrap';
  islands.forEach(function(isl){
    var st = getISL(isl);
    var rFull = st.refinados > 24;
    var eFull = st.elite > 26;
    var cCount=[27,28,29,30].filter(function(s){ return st.compose[s]===1; }).length;
    var cFull = cCount===4;
    var card = document.createElement('div'); card.className='resumo-card';
    card.innerHTML =
      '<div class="resumo-title '+isl+'">⚔ '+names[isl]+'</div>'+
      '<div class="resumo-row"><span class="resumo-label">Refinados</span><span class="resumo-val'+(rFull?' alerta':'')+'">'+
        (rFull?'CHEIAS':'#'+st.refinados+' — '+getName(isl,st.refinados))+'</span></div>'+
      '<div class="resumo-row"><span class="resumo-label">Itens Elite</span><span class="resumo-val'+(eFull?' alerta':'')+'">'+
        (eFull?'CHEIAS':'#'+st.elite+' — '+getName(isl,st.elite))+'</span></div>'+
      '<div class="resumo-row"><span class="resumo-label">Compose</span><span class="resumo-val'+(cFull?' alerta':' ok')+'">'+cCount+'/4 cheias</span></div>';
    wrap.appendChild(card);
  });
  main.appendChild(wrap);
}

function navigate(type, dir) {
  var st = getISL(view);
  var min=RANGES[type][0], max=RANGES[type][1];
  if(dir===1 && st[type]<=max){ st[type]++; vibe([30]); }
  if(dir===-1 && st[type]>min){ st[type]--; vibe([10,10,10]); }
  if(st[type]===max) vibe([50,30,50,30,100]);
  setISL(view,st); render();
}

function navigateCompose(dir) {
  var st = getISL(view);
  var slots=[27,28,29,30];
  var allFull=slots.every(function(s){ return st.compose[s]===1; });
  if(dir===1){
    if(allFull){ slots.forEach(function(s){ st.compose[s]=0; }); vibe([10,10,10]); }
    else{ var a=slots.find(function(s){ return st.compose[s]!==1; }); if(a){ st.compose[a]=1; vibe([30]); } }
    if(slots.every(function(s){ return st.compose[s]===1; })) vibe([50,30,50,30,100]);
  } else {
    var last=null; slots.forEach(function(s){ if(st.compose[s]===1) last=s; });
    if(last){ st.compose[last]=0; vibe([10,10,10]); }
  }
  setISL(view,st); render();
}

function confirmReset() {
  if(confirm('Resetar '+view.toUpperCase()+'?\nContadores voltam ao início.')){
    var s=loadState(); delete s[view]; saveState(s); vibe([20,20,20,20,50]); render();
  }
}

function el(tag,cls,txt){
  var e=document.createElement(tag); e.className=cls;
  if(txt!==undefined) e.textContent=txt; return e;
}
function btn(txt,cls,fn){
  var b=document.createElement('button'); b.className=cls; b.textContent=txt; b.onclick=fn; return b;
}

function tick(){
  var n=new Date();
  document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
tick(); setInterval(tick,10000);
render();
</script>

    <h3 id="modalTitle">Exportar dados</h3>
    <textarea id="modalText" placeholder="..."></textarea>
    <div class="modal-btns">
      <button class="modal-btn-confirm" id="modalConfirm">Copiar & Fechar</button>
      <button class="modal-btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>
</body>
