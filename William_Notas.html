<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📓 William Notas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a14; color: #e8e8e8; min-height: 100vh; }

.topbar { background: #111122; border-bottom: 1px solid #2a2a3a; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar h1 { font-size: 12px; color: #c8a96e; letter-spacing: 1px; font-weight: 700; }
.clock { font-size: 17px; font-weight: 700; color: #c8a96e; font-variant-numeric: tabular-nums; }

.container { padding: 10px; max-width: 480px; margin: 0 auto; }

.card { background: #141424; border: 1px solid #2a2a3a; border-radius: 14px; padding: 14px; margin-bottom: 10px; }
.card-title { font-size: 11px; font-weight: 700; color: #c8a96e; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

.btn-reset { width: 100%; padding: 10px; background: none; border: 1px solid #444; border-radius: 10px; color: #888; font-size: 12px; font-weight: 700; cursor: pointer; }
.login-overlay { position: fixed; inset: 0; background: #0a0a14; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: #141424; border: 1px solid #2a2a3a; border-radius: 16px; padding: 28px 22px; width: 100%; max-width: 320px; text-align: center; }
.login-box h2 { font-size: 15px; color: #c8a96e; letter-spacing: 1px; margin-bottom: 4px; }
.login-box p { font-size: 11px; color: #666; margin-bottom: 18px; }
.login-box input { width: 100%; background: #1a1a2e; border: 1px solid #333; border-radius: 10px; padding: 11px 12px; font-size: 14px; color: #e8e8e8; outline: none; font-family: inherit; margin-bottom: 10px; }
.login-box input:focus { border-color: #c8a96e; }
.login-box button { width: 100%; background: #c8a96e; color: #111; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.login-box button:disabled { opacity: 0.6; }
.login-error { font-size: 11px; color: #ff6666; margin-top: 10px; min-height: 14px; }
</style>
</head>
<body>
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>⚔ WILLIAM</h2>
    <p>Acesso restrito — entre com sua conta</p>
    <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="username">
    <input type="password" id="loginSenha" placeholder="Senha" autocomplete="current-password">
    <button id="loginBtn">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>


<div class="topbar">
  <h1>⚔ WILLIAM — NOTAS</h1>
  <div class="clock" id="clock">00:00</div>
</div>

<div class="container" id="main"></div>

<script>
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
var KEY = 'william_superapp_v1'; // mesma chave do SuperApp — dados ficam sincronizados
function loadState() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e) { return {}; } }
function saveState(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch(e) {} }

function getNotas() { var s=loadState(); return s.notas_diarias||[]; }
function setNotas(d) { var s=loadState(); s.notas_diarias=d; saveState(s); }

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function el(tag,cls,txt){var e=document.createElement(tag);e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function vibe(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
function tick(){var n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
tick(); setInterval(tick,10000);

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render(){
  var main = document.getElementById('main');
  main.innerHTML = '';
  renderNotas(main);
}

function renderNotas(main) {
  var notas = getNotas();
  var aberto = window._notaAberta !== undefined ? window._notaAberta : null;

  var card = document.createElement('div'); card.className='card';
  card.appendChild(el('div','card-title','📓 NOTAS & IDEIAS — '+notas.length+' registradas'));

  // Campos: Título + Texto
  var fTitulo = document.createElement('input');
  fTitulo.id='notaTitulo'; fTitulo.type='text'; fTitulo.placeholder='Título da nota...';
  fTitulo.style.cssText='width:100%;background:#1a1a2e;border:1px solid #c8a96e;border-radius:10px;padding:10px 12px;font-size:15px;color:#c8a96e;font-weight:700;outline:none;font-family:inherit;margin-bottom:8px;';
  card.appendChild(fTitulo);

  var ta = document.createElement('textarea');
  ta.id='notaInput'; ta.placeholder='Escreva sua nota aqui...';
  ta.style.cssText='width:100%;background:#1a1a2e;border:1px solid #333;border-radius:10px;padding:10px 12px;font-size:14px;color:#e8e8e8;outline:none;font-family:inherit;resize:vertical;min-height:80px;margin-bottom:8px;';
  card.appendChild(ta);

  var addBtn = document.createElement('button');
  addBtn.textContent='💾 Salvar nota';
  addBtn.style.cssText='width:100%;background:#c8a96e;color:#111;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:14px;';
  addBtn.onclick = function(){
    var titulo=document.getElementById('notaTitulo').value.trim();
    var texto=document.getElementById('notaInput').value.trim();
    if(!titulo){alert('Digite um título!');return;}
    if(!texto){alert('Digite o texto da nota!');return;}
    var now=new Date();
    var ns=getNotas();
    ns.unshift({titulo:titulo, texto:texto, data:now.toLocaleDateString('pt-BR'), hora:now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})});
    setNotas(ns); vibe([30]); window._notaAberta=0; render();
  };
  card.appendChild(addBtn);

  // Lista de títulos
  if(notas.length===0){
    var empty=el('div','','Nenhuma nota ainda. 💡');
    empty.style.cssText='text-align:center;color:#555;font-size:13px;padding:16px 0;';
    card.appendChild(empty);
  } else {
    notas.forEach(function(n,i){
      var isOpen = (aberto===i);

      var row = document.createElement('div');
      row.style.cssText='background:#0f0f1e;border:1px solid '+(isOpen?'#c8a96e':'#2a2a3a')+';border-radius:10px;margin-bottom:7px;overflow:hidden;';

      // Cabeçalho clicável
      var hdr = document.createElement('div');
      hdr.style.cssText='display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;';
      hdr.onclick=(function(idx){ return function(){
        window._notaAberta = (window._notaAberta===idx) ? null : idx;
        render();
      };})(i);

      var arrow = el('span','', isOpen?'▼':'▶');
      arrow.style.cssText='font-size:10px;color:#c8a96e;flex-shrink:0;';
      var titulo = el('div','', n.titulo||(n.texto||'').substring(0,30)+'...');
      titulo.style.cssText='flex:1;font-size:14px;font-weight:700;color:#e8e8e8;';
      var stamp = el('div','', n.data);
      stamp.style.cssText='font-size:10px;color:#555;white-space:nowrap;';
      var del = document.createElement('button');
      del.textContent='🗑️';
      del.style.cssText='background:none;border:none;font-size:15px;cursor:pointer;color:#555;padding:2px 4px;flex-shrink:0;';
      del.onclick=(function(idx){ return function(e){
        e.stopPropagation();
        if(confirm('Deletar "'+notas[idx].titulo+'"?')){
          var ns=getNotas(); ns.splice(idx,1); setNotas(ns);
          if(window._notaAberta===idx) window._notaAberta=null;
          render();
        }
      };})(i);

      hdr.appendChild(arrow); hdr.appendChild(titulo); hdr.appendChild(stamp); hdr.appendChild(del);
      row.appendChild(hdr);

      // Texto expandido
      if(isOpen){
        var body = document.createElement('div');
        body.style.cssText='padding:0 12px 12px;border-top:1px solid #2a2a3a;';
        var stamp2 = el('div','','📅 '+n.data+' às '+n.hora);
        stamp2.style.cssText='font-size:10px;color:#555;padding:8px 0 6px;';
        var txt = el('div','',n.texto);
        txt.style.cssText='font-size:13px;color:#e8e8e8;line-height:1.7;white-space:pre-wrap;';
        body.appendChild(stamp2); body.appendChild(txt);
        row.appendChild(body);
      }
      card.appendChild(row);
    });

    var limpar=document.createElement('button');
    limpar.className='btn-reset';
    limpar.textContent='🗑️ Apagar todas as notas';
    limpar.style.cssText='margin-top:4px;color:#aa3333;border-color:#aa3333;';
    limpar.onclick=function(){
      if(confirm('Apagar TODAS as notas?')){ setNotas([]); window._notaAberta=null; render(); }
    };
    card.appendChild(limpar);
  }
  main.appendChild(card);
}

// INIT
render();
</script>


<!-- 🔄 SINCRONIZAÇÃO EM NUVEM (Firebase) + LOGIN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBNKjp7hLNK6mzAX2GK49WEZq-NKgQ9o5Y",
  authDomain: "williamapp-31dff.firebaseapp.com",
  projectId: "williamapp-31dff",
  storageBucket: "williamapp-31dff.firebasestorage.app",
  messagingSenderId: "171912065024",
  appId: "1:171912065024:web:9c47f66f4b8e7fc727a8e5"
};

const ALLOWED_EMAIL = "marcelodossantosfc@gmail.com";

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const docRef = doc(db, "william", "state");

var overlay = document.getElementById('loginOverlay');
var emailIn = document.getElementById('loginEmail');
var senhaIn = document.getElementById('loginSenha');
var loginBtn = document.getElementById('loginBtn');
var errEl = document.getElementById('loginError');

function showError(msg){ errEl.textContent = msg; }

function tryLogin(){
  var email = emailIn.value.trim();
  var senha = senhaIn.value;
  if(!email || !senha){ showError('Preencha e-mail e senha.'); return; }
  loginBtn.disabled = true; loginBtn.textContent = 'Entrando...';
  showError('');
  signInWithEmailAndPassword(auth, email, senha)
    .catch(function(e){
      loginBtn.disabled = false; loginBtn.textContent = 'Entrar';
      showError('E-mail ou senha incorretos.');
    });
}
loginBtn.onclick = tryLogin;
senhaIn.addEventListener('keydown', function(e){ if(e.key==='Enter') tryLogin(); });
emailIn.addEventListener('keydown', function(e){ if(e.key==='Enter') senhaIn.focus(); });

window._applyingRemote = false;

var _origSaveState = window.saveState;
window.saveState = function(s) {
  _origSaveState(s);
  if (!window._applyingRemote && auth.currentUser && auth.currentUser.email === ALLOWED_EMAIL) {
    setDoc(docRef, s).catch(function(e){ console.error('Erro ao sincronizar:', e); });
  }
};

var unsubscribe = null;

onAuthStateChanged(auth, function(user){
  if (user && user.email === ALLOWED_EMAIL) {
    overlay.style.display = 'none';
    loginBtn.disabled = false; loginBtn.textContent = 'Entrar';

    if (!unsubscribe) {
      unsubscribe = onSnapshot(docRef, function(snap){
        if (!snap.exists()) { setDoc(docRef, window.loadState()); return; }
        var remoteStr = JSON.stringify(snap.data());
        var localStr = JSON.stringify(window.loadState());
        if (localStr === remoteStr) return;
        window._applyingRemote = true;
        localStorage.setItem(window.KEY || 'william_superapp_v1', remoteStr);
        window._applyingRemote = false;
        if (typeof window.render === 'function') window.render();
      }, function(err){ console.error('Erro de sincronização:', err); });
    }
  } else if (user && user.email !== ALLOWED_EMAIL) {
    signOut(auth);
    overlay.style.display = 'flex';
    showError('Conta não autorizada.');
  } else {
    overlay.style.display = 'flex';
  }
});
</script>

</body>
</html>
